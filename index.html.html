<!DOCTYPE html>
<html lang="id" data-theme="light" data-density="regular">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGAB AMAN - Sistem Informasi Gawat dan Bencana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* AMAN Platform — design tokens + shell styles
   Aesthetic: nature + tech. Deep green primary, generous whitespace, neutral grays.
   shadcn-ish: subtle borders, soft shadows, modest radii. */

:root {
  /* greens (deep / mid / leaf / wash) */
  --green-900: oklch(0.30 0.06 155);
  --green-700: oklch(0.42 0.09 152);
  --green-600: oklch(0.50 0.10 150);
  --green-500: oklch(0.58 0.11 148);
  --green-100: oklch(0.94 0.04 150);
  --green-50:  oklch(0.97 0.02 150);

  /* neutrals */
  --bg:        oklch(0.995 0.002 100);
  --bg-subtle: oklch(0.97 0.003 110);
  --bg-elev:   #ffffff;
  --border:    oklch(0.91 0.005 110);
  --border-strong: oklch(0.83 0.008 110);
  --fg:        oklch(0.22 0.01 150);
  --fg-muted:  oklch(0.48 0.01 150);
  --fg-subtle: oklch(0.62 0.008 150);

  /* status */
  --warn:    oklch(0.72 0.16 70);
  --warn-bg: oklch(0.96 0.04 80);
  --danger:    oklch(0.58 0.18 27);
  --danger-bg: oklch(0.96 0.04 27);
  --info:    oklch(0.55 0.13 240);
  --info-bg: oklch(0.96 0.03 240);
  --ok:      oklch(0.55 0.13 150);
  --ok-bg:   oklch(0.95 0.04 150);

  /* primary (mapped from --accent-hue) */
  --accent-hue: 150;
  --accent-chroma: 0.09;
  --primary:    oklch(0.42 var(--accent-chroma) var(--accent-hue));
  --primary-hover: oklch(0.36 var(--accent-chroma) var(--accent-hue));
  --primary-fg: #ffffff;
  --primary-wash: oklch(0.94 0.03 var(--accent-hue));

  /* density */
  --row-h: 36px;
  --pad-1: 6px;
  --pad-2: 10px;
  --pad-3: 14px;
  --pad-4: 20px;
  --pad-5: 28px;

  /* type scale */
  --text-2xs: 10px;
  --text-xs: 11px;
  --text-sm: 12.5px;
  --text-base: 13.5px;
  --text-lg: 15px;
  --text-xl: 18px;
  --text-2xl: 22px;
  --text-3xl: 28px;

  /* elevation */
  --elev-1: 0 1px 2px rgba(0, 0, 0, 0.04), 0 0 0 0.5px rgba(0, 0, 0, 0.05);
  --elev-2: 0 2px 8px rgba(0, 0, 0, 0.06), 0 0 0 0.5px rgba(0, 0, 0, 0.04);
  --elev-3: 0 8px 24px rgba(0, 0, 0, 0.10), 0 2px 6px rgba(0, 0, 0, 0.04);
  --elev-4: 0 16px 48px rgba(0, 0, 0, 0.14), 0 4px 12px rgba(0, 0, 0, 0.06);

  /* radii */
  --r-sm: 5px;
  --r-md: 7px;
  --r-lg: 10px;
  --r-xl: 14px;

  /* type */
  --font-sans: "Manrope", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

[data-density="compact"] {
  --row-h: 28px;
  --pad-1: 4px;
  --pad-2: 6px;
  --pad-3: 10px;
  --pad-4: 14px;
  --pad-5: 18px;
}
[data-density="comfortable"] {
  --row-h: 44px;
  --pad-1: 8px;
  --pad-2: 12px;
  --pad-3: 18px;
  --pad-4: 24px;
  --pad-5: 36px;
}

[data-theme="dark"] {
  --bg:        oklch(0.18 0.01 150);
  --bg-subtle: oklch(0.22 0.01 150);
  --bg-elev:   oklch(0.24 0.012 150);
  --border:    oklch(0.30 0.012 150);
  --border-strong: oklch(0.38 0.012 150);
  --fg:        oklch(0.95 0.005 150);
  --fg-muted:  oklch(0.72 0.008 150);
  --fg-subtle: oklch(0.58 0.008 150);
  --green-100: oklch(0.32 0.05 150);
  --green-50:  oklch(0.26 0.04 150);
  --primary:    oklch(0.62 var(--accent-chroma) var(--accent-hue));
  --primary-hover: oklch(0.70 var(--accent-chroma) var(--accent-hue));
  --primary-wash: oklch(0.30 0.05 var(--accent-hue));
  --warn-bg: oklch(0.32 0.05 80);
  --danger-bg: oklch(0.32 0.06 27);
  --info-bg: oklch(0.30 0.05 240);
  --ok-bg: oklch(0.30 0.05 150);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--fg);
  font-size: var(--text-base);
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#root { height: 100vh; display: flex; flex-direction: column; }

button { font: inherit; color: inherit; cursor: pointer; }

/* ── App shell ───────────────────────────────────────────── */

.app-shell { display: flex; flex: 1; min-height: 0; }

.header {
  display: flex;
  align-items: center;
  height: 48px;
  padding: 0 var(--pad-3);
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  gap: var(--pad-3);
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--primary);
  color: var(--primary-fg);
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: -0.04em;
  box-shadow: var(--elev-1);
}
.brand-mark svg { width: 15px; height: 15px; }
.brand-text { line-height: 1.05; }
.brand-text .l1 { font-size: 13px; font-weight: 700; }
.brand-text .l2 { font-size: 10px; color: var(--fg-muted); font-weight: 500; letter-spacing: 0.02em; }

.header-search {
  flex: 1; max-width: 420px;
  position: relative;
}
.header-search button {
  width: 100%;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0 14px 0 32px;
  background: var(--bg-subtle);
  color: var(--fg-muted);
  font: inherit;
  font-size: 12px;
  outline: none;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.header-search button:hover { background: var(--bg-elev); border-color: var(--border-strong); color: var(--fg); }
.header-search .kbd {
  margin-left: auto;
  font: 500 10px var(--font-mono);
  padding: 2px 5px;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--fg-muted);
  background: var(--bg-elev);
  letter-spacing: 0.05em;
}
.header-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: var(--fg-muted); }

.header-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.icon-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  border-radius: var(--r-md);
  display: grid; place-items: center;
  color: var(--fg-muted);
  position: relative;
  cursor: pointer;
}
.icon-btn:hover { color: var(--fg); border-color: var(--border-strong); }
.icon-btn svg { width: 14px; height: 14px; }
.icon-btn .dot {
  position: absolute; top: 5px; right: 5px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--danger);
  box-shadow: 0 0 0 2px var(--bg-elev);
}

.lang-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  height: 32px;
  font-size: 11px;
  font-weight: 600;
}
.lang-toggle button {
  border: 0; background: var(--bg-elev); color: var(--fg-muted);
  padding: 0 9px;
  cursor: pointer;
}
.lang-toggle button[data-on="1"] { background: var(--primary); color: var(--primary-fg); }

/* Realtime status pill */
.rt-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 10px; height: 32px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--bg-elev);
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-muted);
}
.rt-pill .ws-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 0 0 currentColor;
  animation: rtPulse 2s ease-in-out infinite;
  color: var(--ok);
}
@keyframes rtPulse {
  0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
  50% { box-shadow: 0 0 0 4px transparent; opacity: 0.7; }
}
.rt-pill .ws-label { color: var(--fg); font-weight: 700; letter-spacing: 0.04em; }

.user-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 0 10px 0 3px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--bg-elev);
  cursor: pointer;
}
.user-pill:hover { border-color: var(--border-strong); }
.user-pill .avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--primary-wash); color: var(--primary);
  display: grid; place-items: center;
  font-weight: 700; font-size: 10px;
}
.user-pill .meta { line-height: 1.05; font-size: 11px; }
.user-pill .meta .n { font-weight: 600; }
.user-pill .meta .r { color: var(--fg-muted); font-size: 9.5px; }

/* sidebar */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg-elev);
  display: flex;
  flex-direction: column;
  transition: width .18s ease;
  overflow: hidden;
  position: relative;
}
.sidebar.collapsed { width: 52px; }
.sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px 8px; }
.sb-group { margin-bottom: 12px; }
.sb-group-label {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--fg-subtle);
  padding: 0 8px 4px;
}
.sidebar.collapsed .sb-group-label { opacity: 0; height: 8px; }
.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 10px;
  height: 30px;
  border-radius: var(--r-md);
  border: 0;
  background: transparent;
  color: var(--fg-muted);
  font-size: 12.5px;
  width: 100%;
  text-align: left;
  font-weight: 500;
  position: relative;
  cursor: pointer;
}
.sb-item:hover { background: var(--bg-subtle); color: var(--fg); }
.sb-item.active { background: var(--primary-wash); color: var(--primary); font-weight: 600; }
[data-theme="dark"] .sb-item.active { color: var(--primary); }
.sb-item.active::before {
  content: '';
  position: absolute; left: -8px; top: 6px; bottom: 6px; width: 2px;
  background: var(--primary); border-radius: 0 2px 2px 0;
}
.sb-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.sb-item .lbl { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-item .badge {
  font-size: 9.5px; font-weight: 700;
  padding: 1px 5px; border-radius: 999px;
  background: var(--warn-bg); color: var(--warn);
}
.sb-item .badge.danger { background: var(--danger-bg); color: var(--danger); }
.sb-item .badge.ok { background: var(--ok-bg); color: var(--ok); }
.sidebar.collapsed .sb-item .lbl,
.sidebar.collapsed .sb-item .badge { display: none; }
.sidebar.collapsed .sb-item { justify-content: center; padding: 0; }

/* Hover-preview overlay: floats over content without shifting columns. */
.sidebar.floating {
  position: absolute;
  top: 0; bottom: 0;
  width: 220px;
  z-index: 900;
  border-right: 1px solid var(--border);
  background: var(--bg-elev);
  box-shadow: var(--elev-3);
  animation: sidebarPeek .18s cubic-bezier(.2,.7,.3,1);
}
.sidebar.floating .sb-item .lbl,
.sidebar.floating .sb-item .badge { display: flex; }
.sidebar.floating .sb-item { justify-content: flex-start; padding: 0 10px; }
.sidebar.floating .sidebar-foot .org { justify-content: flex-start; padding: 6px 8px; }
.sidebar.floating .sidebar-foot .org .text { display: block; }
.sidebar.floating .sb-group-label { opacity: 1; height: auto; }
@keyframes sidebarPeek {
  from { transform: translateX(-12px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
/* The app-shell needs position so the floating overlay anchors to it. */
.app-shell { position: relative; }

.sidebar-foot {
  border-top: 1px solid var(--border);
  padding: 8px;
}
.sidebar-foot .org {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  border-radius: var(--r-md);
  background: var(--bg-subtle);
  font-size: 11px;
}
.sidebar.collapsed .sidebar-foot .org .text { display: none; }
.sidebar.collapsed .sidebar-foot .org { justify-content: center; padding: 4px; }
.sidebar-foot .org .logo {
  width: 24px; height: 24px; border-radius: 5px; background: var(--green-100); color: var(--green-700);
  display: grid; place-items: center; font-weight: 800; font-size: 9px; flex-shrink: 0;
}
.sidebar-foot .org .text .a { font-weight: 600; }
.sidebar-foot .org .text .b { color: var(--fg-muted); font-size: 9.5px; }

.main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

/* ── Common bits ─────────────────────────────────────────── */

.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: var(--pad-3);
  padding: 16px var(--pad-4) 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
}
.page-head .crumbs {
  font-size: 11px;
  color: var(--fg-muted);
  margin-bottom: 4px;
  font-weight: 500;
}
.page-head h1 {
  margin: 0;
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -0.015em;
}
.page-head .sub-label {
  font-size: 11.5px;
  color: var(--fg-muted);
  margin-top: 3px;
}
.page-head .actions { display: flex; gap: 6px; align-items: center; }

.btn {
  height: 32px;
  padding: 0 12px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--fg);
  font-weight: 500;
  font-size: 12px;
  display: inline-flex; align-items: center; gap: 6px;
  cursor: pointer;
  transition: border-color .12s, background .12s;
}
.btn:hover { border-color: var(--border-strong); }
.btn svg { width: 13px; height: 13px; }
.btn.primary { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
.btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn.danger { background: var(--danger); color: white; border-color: var(--danger); }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--bg-subtle); }
.btn.sm { height: 26px; padding: 0 9px; font-size: 11.5px; }
.btn.icon { width: 32px; padding: 0; justify-content: center; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--pad-2) var(--pad-3);
  border-bottom: 1px solid var(--border);
}
.card-head h3 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
.card-head .sub { font-size: 11px; color: var(--fg-muted); }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg-subtle);
  color: var(--fg-muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.chip.danger { background: var(--danger-bg); color: var(--danger); border-color: transparent; }
.chip.warn { background: var(--warn-bg); color: var(--warn); border-color: transparent; }
.chip.ok { background: var(--ok-bg); color: var(--ok); border-color: transparent; }
.chip.info { background: var(--info-bg); color: var(--info); border-color: transparent; }
.chip.primary { background: var(--primary-wash); color: var(--primary); border-color: transparent; }
.chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.kv { display: grid; grid-template-columns: max-content 1fr; gap: 6px 16px; font-size: 12.5px; }
.kv dt { color: var(--fg-muted); }
.kv dd { margin: 0; font-weight: 500; }

.tag-mono {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: -0.01em;
}

/* Scrollbar */
.scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.scroll::-webkit-scrollbar-track { background: transparent; }
.scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; border: 2px solid var(--bg); background-clip: content-box; }
.scroll { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }

/* Map */
.leaflet-container { background: var(--bg-subtle) !important; font-family: var(--font-sans) !important; }
[data-theme="dark"] .leaflet-tile { filter: hue-rotate(180deg) invert(0.92) brightness(0.95); }
.aman-marker {
  width: 28px; height: 28px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  border: 2px solid white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  display: grid; place-items: center;
}
.aman-marker > div { transform: rotate(45deg); color: white; font-size: 13px; line-height: 1; }
.pulse-marker {
  width: 16px; height: 16px;
  border-radius: 50%;
  position: relative;
}
.pulse-marker::before {
  content: ''; position: absolute; inset: -6px;
  border-radius: 50%;
  background: inherit;
  opacity: 0.3;
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0% { transform: scale(0.6); opacity: 0.6; }
  100% { transform: scale(1.8); opacity: 0; }
}

/* form controls */
.input {
  width: 100%;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0 12px;
  background: var(--bg-elev);
  color: var(--fg);
  font: inherit;
  outline: none;
}
.input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-wash); }
textarea.input { height: auto; padding: 10px 12px; resize: vertical; min-height: 80px; line-height: 1.5; }
.select {
  width: 100%;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0 32px 0 12px;
  background: var(--bg-elev) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23737373' d='M0 0h10L5 6z'/></svg>") no-repeat right 10px center;
  color: var(--fg);
  font: inherit;
  outline: none;
  appearance: none;
}
.label { display: block; font-size: 12px; font-weight: 600; color: var(--fg); margin-bottom: 6px; }
.label .hint { font-weight: 400; color: var(--fg-muted); margin-left: 6px; }

/* tabs */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); padding: 0 var(--pad-4); }
.tabs button {
  border: 0; background: transparent;
  padding: 10px 14px;
  font-size: 13px; font-weight: 500;
  color: var(--fg-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tabs button:hover { color: var(--fg); }
.tabs button.active { color: var(--fg); border-bottom-color: var(--primary); font-weight: 600; }

/* progress */
.bar { height: 6px; background: var(--bg-subtle); border-radius: 999px; overflow: hidden; }
.bar > div { height: 100%; background: var(--primary); border-radius: 999px; }
.bar.warn > div { background: var(--warn); }
.bar.danger > div { background: var(--danger); }
.bar.ok > div { background: var(--ok); }

/* en label */
.bi { display: inline-flex; flex-direction: column; line-height: 1.1; }
.bi-en { font-size: 0.78em; color: var(--fg-muted); font-weight: 400; letter-spacing: 0.005em; }

/* leaflet popup override */
.leaflet-popup-content-wrapper {
  background: var(--bg-elev) !important;
  color: var(--fg) !important;
  border-radius: var(--r-md) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15) !important;
}
.leaflet-popup-tip { background: var(--bg-elev) !important; }
.leaflet-popup-content { margin: 10px 12px !important; font-family: var(--font-sans) !important; }
.leaflet-control-zoom a {
  background: var(--bg-elev) !important;
  color: var(--fg) !important;
  border-color: var(--border) !important;
}
.leaflet-control-attribution {
  background: rgba(255,255,255,0.75) !important;
  font-size: 10px !important;
}
[data-theme="dark"] .leaflet-control-attribution { background: rgba(0,0,0,0.6) !important; color: var(--fg-muted) !important; }
[data-theme="dark"] .leaflet-control-attribution a { color: var(--fg) !important; }

/* status colors for markers */
.marker-banjir { background: oklch(0.55 0.13 240); }
.marker-karhutla { background: oklch(0.58 0.18 27); }
.marker-gempa { background: oklch(0.45 0.06 280); }
.marker-longsor { background: oklch(0.55 0.11 50); }
.marker-kekeringan { background: oklch(0.62 0.10 80); }

/* empty state */
.empty {
  display: grid; place-items: center;
  padding: 40px 20px;
  color: var(--fg-muted);
  text-align: center;
  font-size: 13px;
}

/* skeleton */
.skel { background: linear-gradient(90deg, var(--bg-subtle), var(--border), var(--bg-subtle)); background-size: 200% 100%; animation: skel 1.6s linear infinite; border-radius: 4px; }
@keyframes skel { from { background-position: 0% 0; } to { background-position: -200% 0; } }

/* Header popovers */
.popover {
  position: fixed;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--elev-4);
  z-index: 9001;
  overflow: hidden;
  animation: popoverIn .15s ease;
}
@keyframes popoverIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.98); }
  to { opacity: 1; transform: none; }
}

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  border: 0;
  background: transparent;
  color: var(--fg);
  font: 500 12.5px var(--font-sans);
  cursor: pointer;
  width: 100%;
  text-align: left;
}
.dropdown-item:hover { background: var(--bg-subtle); }
.dropdown-item svg { color: var(--fg-muted); flex-shrink: 0; }
.dropdown-item .meta {
  margin-left: auto;
  font: 500 10px var(--font-mono);
  color: var(--fg-muted);
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-subtle);
}

/* ═══ Command Palette ═══ */
.cmdk-backdrop {
  position: fixed; inset: 0;
  background: rgba(15, 25, 20, 0.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 10000;
  display: grid;
  place-items: start center;
  padding-top: 12vh;
  animation: cmdkFade .15s ease;
}
@keyframes cmdkFade {
  from { opacity: 0; }
  to { opacity: 1; }
}
.cmdk-panel {
  width: min(600px, calc(100% - 32px));
  max-height: 60vh;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--elev-4);
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: cmdkSlideIn .2s ease;
}
@keyframes cmdkSlideIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.98); }
  to { opacity: 1; transform: none; }
}
.cmdk-input-wrap {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.cmdk-input-wrap svg { color: var(--fg-muted); flex-shrink: 0; }
.cmdk-input {
  flex: 1; border: 0; background: transparent; outline: none;
  font: 500 14.5px var(--font-sans); color: var(--fg);
}
.cmdk-input::placeholder { color: var(--fg-subtle); }
.cmdk-esc {
  font: 500 10px var(--font-mono);
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--fg-muted);
  background: var(--bg-subtle);
}
.cmdk-results { flex: 1; overflow-y: auto; padding: 4px; }
.cmdk-group-label {
  padding: 8px 10px 4px;
  font: 600 9.5px var(--font-sans);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-subtle);
}
.cmdk-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
}
.cmdk-item.active { background: var(--primary-wash); color: var(--primary); }
.cmdk-item:hover { background: var(--bg-subtle); }
.cmdk-item.active:hover { background: var(--primary-wash); }
.cmdk-item .icon-wrap {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--bg-subtle); color: var(--fg-muted);
  display: grid; place-items: center; flex-shrink: 0;
}
.cmdk-item.active .icon-wrap { background: var(--primary); color: white; }
.cmdk-item .label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cmdk-item .label .sub { display: block; font-size: 10.5px; color: var(--fg-muted); margin-top: 1px; font-weight: 400; }
.cmdk-item .meta {
  font: 500 10px var(--font-mono);
  color: var(--fg-muted);
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-subtle);
}
.cmdk-empty {
  padding: 32px 20px;
  text-align: center;
  color: var(--fg-muted);
  font-size: 12.5px;
}
.cmdk-foot {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg-subtle);
  display: flex; align-items: center; gap: 14px;
  font-size: 10.5px; color: var(--fg-muted);
}
.cmdk-foot .kbd {
  font: 500 9.5px var(--font-mono);
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--fg);
  background: var(--bg-elev);
  margin-right: 4px;
}

/* ═══ LOGIN GATE ═══ */
.login-shell {
  position: fixed; inset: 0; z-index: 10000;
  display: grid;
  grid-template-columns: minmax(380px, 1.05fr) minmax(420px, 1fr);
  background: var(--bg);
  font-family: var(--font-sans);
  animation: loginFade .25s ease;
}
@keyframes loginFade { from { opacity: 0; } to { opacity: 1; } }

.login-hero {
  position: relative; overflow: hidden;
  background: var(--green-900);
  color: white;
  display: flex; align-items: center; justify-content: center;
  padding: 56px;
}
.login-hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(120, 180, 140, 0.35), transparent 70%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(60, 140, 100, 0.4), transparent 70%),
    linear-gradient(135deg, #1F5F44, #14403a);
}
.login-hero-bg-pattern {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 14px);
}
.login-hero-content {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column; gap: 40px;
}
.login-brand {
  display: flex; align-items: center; gap: 10px;
  color: white; text-decoration: none; font-weight: 700;
}
.login-brand .mark {
  width: 36px; height: 36px; border-radius: 9px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.15);
  display: grid; place-items: center; color: white;
}
.login-brand .l1 { font-size: 15px; font-weight: 700; line-height: 1.1; }
.login-brand .l2 { font-size: 10.5px; font-weight: 500; opacity: 0.7; margin-top: 2px; }
.login-hero-text h1 {
  font-family: "Fraunces", Georgia, serif;
  font-size: 44px; line-height: 1.05;
  letter-spacing: -0.025em; font-weight: 600; margin: 0;
}
.login-hero-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  padding: 22px 0;
  border-top: 1px solid rgba(255,255,255,0.15);
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.login-hero-stats > div { padding: 0 8px; border-right: 1px solid rgba(255,255,255,0.1); }
.login-hero-stats > div:last-child { border-right: 0; }
.login-hero-stats .v {
  font-family: "Fraunces", Georgia, serif;
  font-size: 24px; font-weight: 600; letter-spacing: -0.02em; line-height: 1;
}
.login-hero-stats .l { font-size: 10.5px; opacity: 0.7; margin-top: 6px; }
.login-quote {
  margin: 0; padding-left: 16px;
  border-left: 2px solid rgba(255,255,255,0.3);
  font-size: 13.5px; line-height: 1.65; opacity: 0.92;
}
.login-quote p { margin: 0 0 6px; font-style: italic; }
.login-quote cite { font-size: 11.5px; font-style: normal; opacity: 0.7; font-weight: 600; }

.login-form-wrap {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  padding: 56px 40px; overflow-y: auto;
}
.login-lang {
  position: absolute; top: 24px; right: 32px;
  display: flex; border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
  font-size: 11px; font-weight: 600;
}
.login-lang button {
  border: 0; background: var(--bg-elev); color: var(--fg-muted);
  padding: 5px 10px; cursor: pointer;
}
.login-lang button[data-on="1"] { background: var(--primary); color: white; }

.login-form {
  width: 100%; max-width: 380px;
  display: flex; flex-direction: column; gap: 16px;
}
.login-form-head h2 {
  font-family: "Fraunces", Georgia, serif;
  font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 6px;
}
.login-form-head p { margin: 0; font-size: 13px; color: var(--fg-muted); line-height: 1.5; }

.login-field { display: flex; flex-direction: column; gap: 6px; }
.login-field label { font-size: 11.5px; font-weight: 600; }
.login-label-row { display: flex; align-items: baseline; justify-content: space-between; }
.login-label-row a { font-size: 11px; color: var(--primary); text-decoration: none; font-weight: 600; }

.login-input-wrap {
  display: flex; align-items: center;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg-elev);
  transition: border-color .15s, box-shadow .15s;
}
.login-input-wrap:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-wash);
}
.login-input-wrap svg { margin-left: 12px; color: var(--fg-muted); flex-shrink: 0; }
.login-input-wrap input {
  flex: 1; border: 0; background: transparent; outline: none;
  padding: 11px 12px; font: 500 13px var(--font-sans); color: var(--fg); min-width: 0;
}
.login-eye {
  border: 0; background: transparent;
  font-size: 11px; font-weight: 600; color: var(--fg-muted);
  cursor: pointer; padding: 0 12px;
}
.login-remember {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--fg-muted); cursor: pointer;
}
.login-error {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--danger-bg); color: var(--danger);
  border-radius: 7px; font-size: 12px; font-weight: 600;
}
.login-btn-primary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 12px;
  background: var(--primary); color: white;
  border: 0; border-radius: 8px;
  font: 600 13.5px var(--font-sans); cursor: pointer;
}
.login-btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
.login-btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
.login-spinner {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.login-divider { position: relative; text-align: center; margin: 4px 0; }
.login-divider::before {
  content: ''; position: absolute; inset: 50% 0 auto;
  height: 1px; background: var(--border);
}
.login-divider span {
  position: relative; background: var(--bg); padding: 0 12px;
  font-size: 11px; font-weight: 600; color: var(--fg-muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.login-btn-secondary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 11px;
  background: var(--bg-elev); color: var(--fg);
  border: 1px solid var(--border); border-radius: 8px;
  font: 600 12.5px var(--font-sans); cursor: pointer;
}
.login-btn-secondary:hover { border-color: var(--fg); }
.login-demo {
  margin-top: 4px; padding: 14px;
  background: var(--bg-subtle); border-radius: 10px;
  border: 1px dashed var(--border);
}
.login-demo-head .t { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.login-demo-head .s { font-size: 10.5px; color: var(--fg-muted); margin: 2px 0 10px; }
.login-demo-head code {
  background: var(--bg-elev); padding: 1px 5px; border-radius: 3px;
  font-family: var(--font-mono); font-size: 10px; color: var(--primary);
}
.login-demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.login-demo-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 7px; cursor: pointer;
  text-align: left; font: inherit;
}
.login-demo-chip:hover { border-color: var(--primary); background: var(--primary-wash); }
.login-demo-chip .avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--primary-wash); color: var(--primary);
  display: grid; place-items: center;
  font-weight: 700; font-size: 10px; flex-shrink: 0;
}
.login-demo-chip .n { font-size: 11.5px; font-weight: 600; color: var(--fg); }
.login-demo-chip .r { font-size: 9.5px; color: var(--fg-muted); }
.login-foot { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.login-secure {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; color: var(--fg-muted); font-weight: 500;
}
.login-secure svg { color: var(--ok); }
.login-legal { font-size: 10.5px; color: var(--fg-muted); line-height: 1.5; }
.login-legal a { color: var(--fg); text-decoration: none; font-weight: 600; }
@media (max-width: 880px) {
  .login-shell { grid-template-columns: 1fr; }
  .login-hero { display: none; }
  .login-form-wrap { padding: 32px 24px; }
}

/* ═══ CONFIRM DIALOG ═══ */
.confirm-backdrop {
  position: fixed; inset: 0;
  background: rgba(15, 25, 20, 0.5);
  backdrop-filter: blur(6px);
  display: grid; place-items: center;
  padding: 20px;
  z-index: 10002;
  animation: confirmFade .15s ease;
}
@keyframes confirmFade { from { opacity: 0; } to { opacity: 1; } }
.confirm-panel {
  background: var(--bg-elev);
  border-radius: 14px;
  width: 100%; max-width: 460px;
  box-shadow: var(--elev-4);
  overflow: hidden;
  animation: confirmSlide .18s cubic-bezier(.2,.7,.3,1);
}
@keyframes confirmSlide {
  from { opacity: 0; transform: translateY(-8px) scale(0.97); }
  to { opacity: 1; transform: none; }
}
.confirm-head {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 18px 18px 0;
}
.confirm-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: grid; place-items: center; flex-shrink: 0;
}
.confirm-title {
  font-family: var(--font-sans);
  margin: 0; font-size: 15px; font-weight: 700;
  letter-spacing: -0.01em;
}
.confirm-sub { font-size: 11.5px; color: var(--fg-muted); margin-top: 2px; }
.confirm-body {
  padding: 14px 22px 18px;
  font-size: 13px; line-height: 1.55; color: var(--fg);
}
.confirm-details {
  margin-top: 12px; padding: 10px 12px;
  background: var(--bg-subtle); border-radius: 8px;
  display: flex; flex-direction: column; gap: 6px;
  font-size: 12px;
}
.confirm-detail-row {
  display: flex; align-items: center; justify-content: space-between;
}
.confirm-warning {
  margin-top: 12px;
  display: flex; gap: 8px; align-items: flex-start;
  padding: 9px 12px;
  border-radius: 7px;
  font-size: 11.5px; font-weight: 600;
}
.confirm-warning svg { margin-top: 1px; flex-shrink: 0; }
.confirm-foot {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 18px 18px;
}

/* ═══ DOCS PAGE ═══ */
.docs-shell {
  display: grid; grid-template-columns: 220px 1fr;
  flex: 1; min-height: 0;
}
.docs-side {
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  overflow-y: auto;
}
.docs-side h6 {
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--fg-subtle);
  margin: 16px 8px 4px;
}
.docs-side h6:first-child { margin-top: 0; }
.docs-side a {
  display: block;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12.5px;
  color: var(--fg-muted);
  text-decoration: none;
  font-weight: 500;
  cursor: pointer;
}
.docs-side a:hover { background: var(--bg-subtle); color: var(--fg); }
.docs-side a.active { background: var(--primary-wash); color: var(--primary); font-weight: 600; }
.docs-main { overflow-y: auto; padding: 32px 40px 80px; max-width: 1040px; }
.docs-main h2 {
  font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
  margin: 0 0 6px; scroll-margin-top: 20px;
}
.docs-main h3 {
  font-size: 16px; font-weight: 700; letter-spacing: -0.01em;
  margin: 28px 0 10px; scroll-margin-top: 20px;
}
.docs-main h4 {
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin: 18px 0 8px;
}
.docs-main p.intro {
  font-size: 14px; color: var(--fg-muted); line-height: 1.6;
  max-width: 720px; margin: 0 0 24px;
}
.docs-block {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg-elev);
  margin-bottom: 14px;
}
.docs-preview {
  padding: 28px 24px;
  background: var(--bg);
  display: flex; gap: 14px; flex-wrap: wrap;
  align-items: center; justify-content: center;
}
.docs-preview.cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; align-items: stretch; }
.docs-code {
  border-top: 1px solid var(--border);
  background: #1a1f1c;
  color: #d4d8d2;
  padding: 14px 18px;
  font: 12px var(--font-mono);
  line-height: 1.65;
  overflow-x: auto;
  white-space: pre;
}
.docs-code .kw { color: #b58af6; }
.docs-code .str { color: #8acc8a; }
.docs-code .com { color: #6b7068; font-style: italic; }
.docs-code .tag { color: #6cb6ff; }
.docs-code .prop { color: #f2c97b; }
.docs-props-table {
  width: 100%; border-collapse: collapse; font-size: 12.5px;
}
.docs-props-table th {
  text-align: left; padding: 8px 14px;
  background: var(--bg-subtle);
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--fg-muted);
}
.docs-props-table td {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  vertical-align: top;
}
.docs-props-table code {
  background: var(--bg-subtle);
  padding: 1px 6px; border-radius: 3px;
  font: 500 11px var(--font-mono);
  color: var(--primary);
}
.docs-anchor {
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--fg-subtle);
  padding-bottom: 4px;
}

/* GIS dashboard slide-in */
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* GIS glass surfaces */
.gis-glass {
  background: color-mix(in oklch, var(--bg-elev), transparent 8%);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid color-mix(in oklch, var(--border), transparent 30%);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.5) inset,
    0 8px 24px rgba(0, 0, 0, 0.08),
    0 2px 6px rgba(0, 0, 0, 0.04);
  border-radius: 12px;
}
[data-theme="dark"] .gis-glass {
  background: color-mix(in oklch, var(--bg-elev), transparent 15%);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.04) inset,
    0 8px 24px rgba(0, 0, 0, 0.4);
}

.gis-tool-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  height: 30px;
  border: 0;
  background: transparent;
  color: var(--fg-muted);
  font: 600 11.5px var(--font-sans);
  border-radius: 6px;
  cursor: pointer;
  transition: background .12s, color .12s;
  white-space: nowrap;
}
.gis-tool-btn:hover { background: var(--bg-subtle); color: var(--fg); }
.gis-tool-btn.active { background: var(--primary); color: white; }
.gis-tool-btn.active:hover { background: var(--primary-hover); }
.gis-tool-btn svg { flex-shrink: 0; }
.gis-tool-btn .lbl { display: none; }
@media (min-width: 1100px) { .gis-tool-btn .lbl { display: inline; } }

.gis-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
  margin: 0 2px;
}

/* segmented control */
.seg-ctl {
  display: inline-flex;
  padding: 2px;
  background: var(--bg-subtle);
  border-radius: 7px;
  position: relative;
}
.seg-ctl button {
  position: relative;
  z-index: 1;
  border: 0;
  background: transparent;
  padding: 0 12px;
  height: 26px;
  font: 600 11.5px var(--font-sans);
  color: var(--fg-muted);
  border-radius: 5px;
  cursor: pointer;
  transition: color .15s;
}
.seg-ctl button.active {
  color: var(--fg);
  background: var(--bg-elev);
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.04);
}

/* mini opacity slider */
.opacity-slider {
  appearance: none;
  -webkit-appearance: none;
  width: 60px;
  height: 3px;
  background: var(--border);
  border-radius: 999px;
  outline: none;
}
.opacity-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--fg-muted);
  cursor: pointer;
}
.opacity-slider::-moz-range-thumb {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--fg-muted);
  border: 0;
  cursor: pointer;
}

/* layer row */
.layer-row {
  display: grid;
  grid-template-columns: 14px auto 10px 1fr auto;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  transition: background .1s;
}
.layer-row:hover { background: var(--bg-subtle); }
.layer-row .vis-toggle {
  width: 22px; height: 22px; border-radius: 5px;
  border: 0; background: transparent;
  display: grid; place-items: center;
  color: var(--fg-muted); cursor: pointer;
  flex-shrink: 0;
}
.layer-row .vis-toggle:hover { background: var(--bg-elev); color: var(--fg); }
.layer-row .vis-toggle.on { color: var(--primary); }

/* count badge */
.count-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-muted);
  background: var(--bg-subtle);
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

/* insight card */
.insight-card {
  display: flex;
  flex-direction: column;
  padding: 10px 12px;
  min-width: 96px;
  border-radius: 8px;
  background: color-mix(in oklch, var(--bg-elev), transparent 5%);
}
.insight-card .lbl {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.insight-card .val {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  margin: 3px 0 2px;
}
.insight-card .delta {
  font-size: 10px;
  font-weight: 600;
  color: var(--fg-muted);
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

  if (n >= 1e3) return 'Rp ' + (n / 1e3).toFixed(0) + ' rb';
  return 'Rp ' + n.toLocaleString('id-ID');
};

window.timeAgo = (iso) => {
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'baru saja';
  if (mins < 60) return mins + ' menit lalu';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + ' jam lalu';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + ' hari lalu';
  return new Date(iso).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {

// ConfirmDialog — reusable destructive/affirmative confirmation modal
// Usage: const confirm = useConfirm(); confirm({title, message, ...}).then(ok => ...)

const ConfirmDialogContext = React.createContext(null);

function ConfirmDialog({ open, opts, onResolve }) {
  const [loading, setLoading] = React.useState(false);
  React.useEffect(() => { if (!open) setLoading(false); }, [open]);
  if (!open || !opts) return null;

  const variant = opts.variant || 'default'; // default | danger | warn | info
  const VARIANT = {
    default: { color: 'var(--primary)', bg: 'var(--primary-wash)', icon: 'sparkle', btnClass: 'btn primary' },
    danger:  { color: 'var(--danger)',  bg: 'var(--danger-bg)',    icon: 'alert',   btnClass: 'btn danger' },
    warn:    { color: 'var(--warn)',    bg: 'var(--warn-bg)',      icon: 'alert',   btnClass: 'btn primary' },
    info:    { color: 'var(--info)',    bg: 'var(--info-bg)',      icon: 'paper',   btnClass: 'btn primary' },
  }[variant];

  const handleConfirm = async () => {
    if (opts.async) {
      setLoading(true);
      try { await Promise.resolve(opts.async()); onResolve(true); }
      catch (e) { setLoading(false); }
    } else {
      onResolve(true);
    }
  };

  return (
    <div className="confirm-backdrop" onClick={() => !loading && onResolve(false)}>
      <div className="confirm-panel" onClick={e => e.stopPropagation()}
           role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
        <div className="confirm-head">
          <div className="confirm-icon" style={{ background: VARIANT.bg, color: VARIANT.color }}>
            <Icon name={opts.icon || VARIANT.icon} size={20} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <h3 id="confirm-title" className="confirm-title">{opts.title}</h3>
            {opts.subtitle && <div className="confirm-sub">{opts.subtitle}</div>}
          </div>
          <button className="icon-btn" onClick={() => !loading && onResolve(false)} disabled={loading}>
            <Icon name="x" size={14} />
          </button>
        </div>

        <div className="confirm-body">
          <p style={{ margin: 0 }}>{opts.message}</p>
          {opts.details && (
            <div className="confirm-details">
              {opts.details.map((d, i) => (
                <div key={i} className="confirm-detail-row">
                  <span style={{ color: 'var(--fg-muted)' }}>{d.label}</span>
                  <span style={{ fontWeight: 600 }}>{d.value}</span>
                </div>
              ))}
            </div>
          )}
          {opts.warning && (
            <div className="confirm-warning" style={{ background: VARIANT.bg, color: VARIANT.color }}>
              <Icon name="alert" size={13} />
              <span>{opts.warning}</span>
            </div>
          )}
        </div>

        <div className="confirm-foot">
          <button className="btn" onClick={() => onResolve(false)} disabled={loading}>
            {opts.cancelLabel || 'Batal'}
          </button>
          <button className={VARIANT.btnClass} onClick={handleConfirm} disabled={loading}>
            {loading ? (
              <>
                <span className="login-spinner"></span>
                {opts.loadingLabel || 'Memproses…'}
              </>
            ) : (opts.confirmLabel || 'Konfirmasi')}
          </button>
        </div>
      </div>
    </div>
  );
}

function ConfirmDialogProvider({ children }) {
  const [open, setOpen] = React.useState(false);
  const [opts, setOpts] = React.useState(null);
  const resolverRef = React.useRef(null);

  const confirm = React.useCallback((options) => {
    setOpts(options);
    setOpen(true);
    return new Promise(res => { resolverRef.current = res; });
  }, []);

  const onResolve = (result) => {
    setOpen(false);
    if (resolverRef.current) resolverRef.current(result);
  };

  return (
    <ConfirmDialogContext.Provider value={confirm}>
      {children}
      <ConfirmDialog open={open} opts={opts} onResolve={onResolve} />
    </ConfirmDialogContext.Provider>
  );
}

function useConfirm() {
  return React.useContext(ConfirmDialogContext);
}

window.ConfirmDialog = ConfirmDialog;
window.ConfirmDialogProvider = ConfirmDialogProvider;
window.useConfirm = useConfirm;

const CommandPalette = ({ open, onClose, lang, onNavigate, onAction }) => {
  const [query, setQuery] = React.useState('');
  const [selectedIdx, setSelectedIdx] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) {
      setQuery(''); setSelectedIdx(0);
      setTimeout(() => inputRef.current?.focus(), 30);
    }
  }, [open]);

  const all = React.useMemo(() => ALL_COMMANDS(AMAN_DATA), []);

  const q = query.toLowerCase().trim();
  const match = (label, sub) => !q || (label + ' ' + (sub || '')).toLowerCase().includes(q);

  const groups = [
    { id: 'actions', label: lang === 'id' ? 'Aksi Cepat' : 'Actions', items: all.actions.filter(a => match(a.label)) },
    { id: 'pages', label: lang === 'id' ? 'Halaman' : 'Pages', items: all.pages.filter(p => match(p.label)) },
    { id: 'incidents', label: lang === 'id' ? 'Insiden' : 'Incidents', items: all.incidents.filter(i => match(i.label, i.sub)).slice(0, 6) },
    { id: 'community', label: lang === 'id' ? 'Komunitas' : 'Communities', items: all.communities.filter(c => match(c.label)).slice(0, 5) },
  ].filter(g => g.items.length > 0);

  // Flat list for keyboard navigation
  const flat = groups.flatMap(g => g.items.map(i => ({ ...i, _group: g.id })));

  React.useEffect(() => { setSelectedIdx(0); }, [query]);

  const runItem = (item) => {
    if (!item) return;
    if (item.route) onNavigate?.(item.route);
    else if (item.kind === 'Action') onAction?.(item.id);
    onClose();
  };

  const onKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); onClose(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedIdx(i => Math.min(i + 1, flat.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setSelectedIdx(i => Math.max(0, i - 1)); }
    else if (e.key === 'Enter') { e.preventDefault(); runItem(flat[selectedIdx]); }
  };

  if (!open) return null;

  let cursor = 0;
  return (
    <div className="cmdk-backdrop" onClick={onClose}>
      <div className="cmdk-panel" onClick={e => e.stopPropagation()}>
        <div className="cmdk-input-wrap">
          <Icon name="search" size={16} />
          <input ref={inputRef} className="cmdk-input"
            placeholder={lang === 'id' ? 'Cari halaman, insiden, komunitas, atau jalankan perintah…' : 'Search pages, incidents, communities, or run a command…'}
            value={query} onChange={e => setQuery(e.target.value)} onKeyDown={onKey} />
          <span className="cmdk-esc">ESC</span>
        </div>
        <div className="cmdk-results scroll">
          {groups.length === 0 ? (
            <div className="cmdk-empty">
              {lang === 'id' ? 'Tidak ada hasil untuk' : 'No results for'} "<strong>{query}</strong>"
            </div>
          ) : groups.map(group => (
            <div key={group.id}>
              <div className="cmdk-group-label">{group.label}</div>
              {group.items.map(item => {
                const idx = cursor++;
                const active = idx === selectedIdx;
                return (
                  <div key={item.id}
                    className={'cmdk-item' + (active ? ' active' : '')}
                    onMouseEnter={() => setSelectedIdx(idx)}
                    onClick={() => runItem(item)}>
                    <div className="icon-wrap"><Icon name={item.icon} size={13} /></div>
                    <div className="label">
                      {item.label}
                      {item.sub && <span className="sub">{item.sub}</span>}
                    </div>
                    {item.meta && <span className="meta">{item.meta}</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <div className="cmdk-foot">
          <span><span className="kbd">↑↓</span>navigate</span>
          <span><span className="kbd">↵</span>select</span>
          <span><span className="kbd">esc</span>close</span>
          <span style={{ marginLeft: 'auto' }}>{flat.length} {lang === 'id' ? 'hasil' : 'results'}</span>
        </div>
      </div>
    </div>
  );
};

function useLeaflet(layers, incidents, onSelect) {
  const mapRef = React.useRef(null);
  const elRef = React.useRef(null);
  const markersRef = React.useRef([]);
  const tileRef = React.useRef(null);

  React.useEffect(() => {
    if (!elRef.current || mapRef.current) return;
    const map = L.map(elRef.current, {
      center: [-2.5, 117],
      zoom: 5,
      zoomControl: true,
      attributionControl: true,
    });
    mapRef.current = map;
    // Invalidate map size when the container resizes (sidebar collapse,
    // tweaks panel, viewport changes) — Leaflet otherwise renders at the
    // initial size and clips.
    const ro = new ResizeObserver(() => {
      if (mapRef.current) mapRef.current.invalidateSize();
    });
    ro.observe(elRef.current);
    return () => {
      ro.disconnect();
      map.remove();
      mapRef.current = null;
    };
  }, []);

  // Tile layer (changes with basemap)
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    if (tileRef.current) map.removeLayer(tileRef.current);
    const url = layers.basemap === 'satellite'
      ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
      : layers.basemap === 'topo'
      ? 'https://a.tile.opentopomap.org/{z}/{x}/{y}.png'
      : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
    tileRef.current = L.tileLayer(url, {
      attribution: layers.basemap === 'satellite' ? 'Tiles © Esri' : '© OpenStreetMap',
      maxZoom: 18,
    }).addTo(map);
  }, [layers.basemap]);

  // Incident markers
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    markersRef.current.forEach(m => map.removeLayer(m));
    markersRef.current = [];
    if (!layers.incidents) return;
    incidents.forEach(inc => {
      const color = TYPE_COLOR[inc.type] || '#666';
      const icon = L.divIcon({
        className: '',
        html: `<div class="aman-marker" style="background:${color}"><div>${({banjir:'≈',karhutla:'🔥',gempa:'~',longsor:'△',kekeringan:'☀'})[inc.type]||'!'}</div></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 28],
      });
      const m = L.marker(inc.coords, { icon }).addTo(map);
      m.bindPopup(`
        <div style="min-width:200px">
          <div style="font-size:10px;color:#888;font-family:ui-monospace,monospace">${inc.id}</div>
          <div style="font-weight:600;font-size:13px;margin:4px 0 6px">${inc.title}</div>
          <div style="font-size:11px;color:#666;margin-bottom:6px">${inc.region}</div>
          <div style="display:flex;gap:6px;font-size:11px">
            <span style="background:${color};color:white;padding:2px 7px;border-radius:99px;font-weight:600">${inc.type}</span>
            <span style="color:#888">${inc.affected.toLocaleString()} jiwa</span>
          </div>
        </div>
      `);
      m.on('click', () => onSelect && onSelect(inc));
      markersRef.current.push(m);
    });
  }, [incidents, layers.incidents, onSelect]);

  // Indigenous territories layer (mock polygons)
  const territoriesRef = React.useRef([]);
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    territoriesRef.current.forEach(p => map.removeLayer(p));
    territoriesRef.current = [];
    if (!layers.territories) return;
    // Mock indigenous regions
    const polygons = [
      [[1.6, 112], [1.6, 114], [0.2, 114.2], [0.0, 112.4]], // West Kalimantan
      [[1, 102], [1, 103.5], [-0.3, 103.5], [-0.3, 102]],     // Riau
      [[-0.2, 119], [-0.2, 120.3], [-1.5, 120.3], [-1.5, 119]], // Sulteng
      [[-9.3, 119.8], [-9.3, 121], [-10.4, 121], [-10.4, 119.8]], // Sumba
    ];
    polygons.forEach(coords => {
      const p = L.polygon(coords, {
        color: '#3a7a4f', weight: 1.5, fillColor: '#3a7a4f', fillOpacity: 0.12, dashArray: '4 4'
      }).addTo(map);
      territoriesRef.current.push(p);
    });
  }, [layers.territories]);

  // EWS warning zones
  const ewsRef = React.useRef([]);
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    ewsRef.current.forEach(p => map.removeLayer(p));
    ewsRef.current = [];
    if (!layers.ews) return;
    AMAN_DATA.ewsAlerts.forEach(a => {
      const color = a.severity === 'high' ? '#c94c2e' : '#d99a30';
      const c = L.circle(a.coords, {
        radius: a.severity === 'high' ? 180000 : 100000,
        color, fillColor: color, fillOpacity: 0.08, weight: 1.5, dashArray: '6 4'
      }).addTo(map);
      c.bindPopup(`<div style="font-size:12px"><b>${a.type}</b><br/>${a.region}<br/><span style="color:#888;font-size:11px">${a.message}</span></div>`);
      ewsRef.current.push(c);
    });
  }, [layers.ews]);

  // Risk heatmap (mock — circle gradient at high-risk regions)
  const riskRef = React.useRef([]);
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    riskRef.current.forEach(p => map.removeLayer(p));
    riskRef.current = [];
    if (!layers.risk) return;
    const riskZones = [
      [0.5, 113, 0.85], [0.2, 102.5, 0.78], [-0.7, 119.7, 0.62],
      [-0.8, 100.6, 0.5], [-9.7, 120.2, 0.55], [-3.3, 104.4, 0.45]
    ];
    riskZones.forEach(([lat, lon, v]) => {
      const radius = 220000 * v;
      for (let i = 3; i > 0; i--) {
        const c = L.circle([lat, lon], {
          radius: radius * (i / 3),
          color: 'transparent',
          fillColor: v > 0.7 ? '#c94c2e' : v > 0.5 ? '#d99a30' : '#3a7a4f',
          fillOpacity: 0.10,
          weight: 0,
          interactive: false,
        }).addTo(map);
        riskRef.current.push(c);
      }
    });
  }, [layers.risk]);

  return elRef;
}

      { id: 'basemap.street', label: 'OSM Street', label_en: 'OSM Street', leaf: true, isBasemap: true },
      { id: 'basemap.satellite', label: 'Esri Satellite', label_en: 'Esri Satellite', leaf: true, isBasemap: true },
      { id: 'basemap.topo', label: 'OpenTopo', label_en: 'OpenTopo', leaf: true, isBasemap: true },
    ],
  },
];

function leafIds(node) {
  if (node.leaf) return [node.id];
  if (!node.children) return [];
  return node.children.flatMap(leafIds);
}

// Live incident count per leaf
function countForLeaf(id, source) {
  if (id.startsWith('incidents.')) {
    const type = id.split('.')[1];
    return source.filter(i => i.type === type).length;
  }
  if (id.startsWith('ews.')) {
    const sev = id.split('.')[1];
    return AMAN_DATA.ewsAlerts.filter(a =>
      sev === 'high' ? (a.severity === 'high' || a.severity === 'critical') : a.severity === 'medium'
    ).length;
  }
  if (id === 'territories') return 5;
  if (id === 'risk') return 6;
  return null;
}

const DEFAULT_VIS = {
  'incidents.banjir': true, 'incidents.karhutla': true, 'incidents.gempa': true, 'incidents.longsor': true, 'incidents.kekeringan': true,
  'ews.high': true, 'ews.medium': true,
  'territories': true, 'risk': false,
  'basemap.street': true, 'basemap.satellite': false, 'basemap.topo': false,
};

const DEFAULT_OPACITY = {
  'incidents.banjir': 1, 'incidents.karhutla': 1, 'incidents.gempa': 1, 'incidents.longsor': 1, 'incidents.kekeringan': 1,
  'ews.high': 1, 'ews.medium': 1, 'territories': 0.7, 'risk': 0.8,
};

// ── layer row component ──────────────────────────────────────────────────────

function LayerLeafRow({ node, vis, opacity, onToggle, onOpacity, onBasemap, lang, source }) {
  const isOn = vis[node.id];
  const count = countForLeaf(node.id, source);

  if (node.isBasemap) {
    return (
      <div className="layer-row" onClick={() => onBasemap(node.id)} style={{
        background: isOn ? 'var(--primary-wash)' : 'transparent',
      }}>
        <span style={{ width: 14 }}></span>
        <input type="radio" name="basemap" checked={isOn} onChange={() => onBasemap(node.id)} style={{ width: 12, height: 12, margin: 0 }} />
        <span></span>
        <span style={{ fontSize: 11.5, color: isOn ? 'var(--primary)' : 'var(--fg-muted)', fontWeight: isOn ? 600 : 500 }}>
          {lang === 'id' ? node.label : node.label_en}
        </span>
        <span></span>
      </div>
    );
  }

  return (
    <div className="layer-row">
      <span style={{ width: 14 }}></span>
      <button className={'vis-toggle' + (isOn ? ' on' : '')} onClick={() => onToggle(node.id)}>
        <Icon name={isOn ? 'check' : 'x'} size={11} style={{ opacity: isOn ? 1 : 0.4 }} />
      </button>
      {node.color && <span style={{ width: 8, height: 8, borderRadius: 2, background: node.color, opacity: isOn ? 1 : 0.3 }}></span>}
      <span style={{
        fontSize: 11.5, color: isOn ? 'var(--fg)' : 'var(--fg-muted)',
        fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
      }} onClick={() => onToggle(node.id)}>
        {lang === 'id' ? node.label : node.label_en}
      </span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        {isOn && opacity[node.id] != null && (
          <input type="range" className="opacity-slider"
            min={0.1} max={1} step={0.1} value={opacity[node.id] ?? 1}
            onChange={e => onOpacity(node.id, Number(e.target.value))}
            title={`Opacity ${Math.round((opacity[node.id] ?? 1) * 100)}%`} />
        )}
        {count != null && <span className="count-pill">{count}</span>}
      </div>
    </div>
  );
}

function LayerGroup({ node, depth, vis, opacity, onToggle, onOpacity, onBasemap, lang, source }) {
  const [expanded, setExpanded] = React.useState(true);
  const leaves = leafIds(node);
  const onCount = leaves.filter(id => vis[id]).length;
  const total = leaves.length;

  const toggleAll = () => {
    const turnOn = onCount !== total;
    leaves.forEach(id => onToggle(id, turnOn));
  };

  return (
    <div style={{ marginBottom: depth === 0 ? 8 : 0 }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 4,
        padding: depth === 0 ? '6px 8px 4px' : '4px 8px',
        cursor: 'pointer',
      }} onClick={() => setExpanded(!expanded)}>
        <button style={{
          border: 0, background: 'transparent', padding: 0,
          width: 14, height: 14, display: 'grid', placeItems: 'center',
          color: 'var(--fg-muted)',
          transform: expanded ? 'rotate(90deg)' : 'none', transition: 'transform .15s',
        }}>
          <Icon name="chev" size={10} />
        </button>
        <span style={{
          flex: 1,
          fontSize: depth === 0 ? 10 : 11.5,
          fontWeight: depth === 0 ? 700 : 600,
          letterSpacing: depth === 0 ? 0.08 : 0.01,
          textTransform: depth === 0 ? 'uppercase' : 'none',
          color: depth === 0 ? 'var(--fg-subtle)' : 'var(--fg)',
        }}>
          {lang === 'id' ? node.label : node.label_en}
        </span>
        {!node.radio && total > 0 && (
          <span className="count-pill" onClick={(e) => { e.stopPropagation(); toggleAll(); }}>
            {onCount}/{total}
          </span>
        )}
      </div>
      {expanded && node.children?.map(c =>
        c.leaf
          ? <LayerLeafRow key={c.id} node={c} vis={vis} opacity={opacity}
                          onToggle={onToggle} onOpacity={onOpacity} onBasemap={onBasemap}
                          lang={lang} source={source} />
          : <LayerGroup key={c.id} node={c} depth={depth + 1} vis={vis} opacity={opacity}
                        onToggle={onToggle} onOpacity={onOpacity} onBasemap={onBasemap}
                        lang={lang} source={source} />
      )}
    </div>
  );
}
