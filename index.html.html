const DEFAULT_WEIGHTS = {
  hazard:   { rainfall: 25, riverFlood: 25, deforestation: 20, seismic: 15, drought: 15 },
  vuln:     { density: 20, poverty: 25, infraAge: 20, isolation: 25, elderly: 10 },
  capacity: { roads: 20, healthCenters: 25, evacPoints: 20, warnings: 20, trainedVol: 15 },
  category: { hazard: 40, vuln: 35, capacity: 25 },
};

function normalize(obj) {
  const sum = Object.values(obj).reduce((a, b) => a + b, 0);
  if (sum === 0) return obj;
  const out = {};
  Object.entries(obj).forEach(([k, v]) => out[k] = (v / sum) * 100);
  return out;
}

// IRB = (Hazard × Vulnerability) / Capacity, scaled.
// We weight all params first, then combine three components.
function calculateIRB(region, weights) {
  const nH = normalize(weights.hazard);
  const nV = normalize(weights.vuln);
  const nC = normalize(weights.capacity);
  const nCat = normalize(weights.category);

  const hazardScore = Object.entries(nH).reduce((s, [k, w]) => s + region.hazard[k] * w / 100, 0);
  const vulnScore = Object.entries(nV).reduce((s, [k, w]) => s + region.vuln[k] * w / 100, 0);
  const capacityScore = Object.entries(nC).reduce((s, [k, w]) => s + region.capacity[k] * w / 100, 0);

  // Combined: weighted by category, with capacity reducing risk
  // Final IRB on 0-100 scale: ((H * wH + V * wV) - C * wC) normalized
  const positive = hazardScore * nCat.hazard / 100 + vulnScore * nCat.vuln / 100;
  const mitigation = capacityScore * nCat.capacity / 100;
  const raw = Math.max(0, positive - mitigation * 0.6);
  // Compress to 0-100
  return { hazardScore, vulnScore, capacityScore, irb: Math.min(100, Math.max(0, raw)) };
}

function riskBand(score) {
  if (score >= 75) return { id: 'Sangat Tinggi', en: 'Very High', color: '#a63426', bg: 'var(--danger-bg)' };
  if (score >= 60) return { id: 'Tinggi', en: 'High', color: '#c94c2e', bg: 'var(--danger-bg)' };
  if (score >= 45) return { id: 'Sedang', en: 'Medium', color: '#d99a30', bg: 'var(--warn-bg)' };
  if (score >= 30) return { id: 'Rendah', en: 'Low', color: '#5e8a2a', bg: 'var(--ok-bg)' };
  return { id: 'Sangat Rendah', en: 'Very Low', color: 'var(--fg-muted)', bg: 'var(--bg-subtle)' };
}

      </div>
      <input type="range" min={0} max={100} step={1} value={value}

// Convert primary hex into oklch-compatible hue we can use for accents
function hexToHue(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, c => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  const r = ((n >> 16) & 255) / 255;
  const g = ((n >> 8) & 255) / 255;
  const b = (n & 255) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let hue = 0;
  if (max !== min) {
    const d = max - min;
    switch (max) {
      case r: hue = ((g - b) / d + (g < b ? 6 : 0)); break;
      case g: hue = ((b - r) / d + 2); break;
      case b: hue = ((r - g) / d + 4); break;
    }
    hue *= 60;
  }
  return hue;
}

        {step === 3 && (
          <div style={{ padding: '40px 32px 32px', textAlign: 'center' }}>
            <div style={{ width: 80, height: 80, borderRadius: '50%', background: 'var(--ok-bg)', color: 'var(--ok)', display: 'grid', placeItems: 'center', margin: '0 auto 20px' }}>
              <Icon name="check" size={40} />
            </div>
            <h2 style={{ margin: '0 0 8px', fontSize: 20, fontWeight: 700 }}>
              {lang === 'id' ? 'Peringatan terkirim' : 'Alert sent'}
            </h2>
            <p style={{ margin: 0, color: 'var(--fg-muted)', fontSize: 13.5 }}>
              {lang === 'id' ? `Disiarkan ke ${estimatedReach.toLocaleString('id-ID')} penerima. Konfirmasi pengiriman tiba bertahap.` : `Sent to ${estimatedReach.toLocaleString('id-ID')} recipients. Delivery confirmations arrive progressively.`}
            </p>
            <div style={{ marginTop: 20, padding: '12px 16px', background: 'var(--bg-subtle)', borderRadius: 10, display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
              <span style={{ color: 'var(--fg-muted)' }}>ID Broadcast</span>
              <span className="tag-mono">EWS-{Math.floor(Math.random() * 9000 + 2300)}</span>
            </div>
          </div>
        )}

        <div style={{ padding: '16px 24px', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 8 }}>
          {step === 3 ? (
            <button className="btn primary" style={{ width: '100%', height: 44 }} onClick={onClose}>
              {lang === 'id' ? 'Tutup' : 'Done'}
            </button>
          ) : step === 2 ? (
            <>
              <button className="btn" onClick={() => setStep(1)} disabled={sending}>← {lang === 'id' ? 'Edit' : 'Edit'}</button>
              <button className="btn danger" style={{ marginLeft: 'auto', minWidth: 200 }} onClick={handleBroadcast} disabled={sending}>
                {sending ? (lang === 'id' ? 'Menyiarkan…' : 'Broadcasting…') : (lang === 'id' ? 'Siarkan Sekarang' : 'Broadcast Now')}
              </button>
            </>
          ) : (
            <>
              <div style={{ fontSize: 11.5, color: 'var(--fg-muted)' }}>
                {lang === 'id' ? 'Estimasi jangkauan: ' : 'Estimated reach: '} <strong style={{ color: 'var(--fg)' }}>{estimatedReach.toLocaleString('id-ID')}</strong>
              </div>
              <button className="btn primary" style={{ marginLeft: 'auto' }} onClick={() => setStep(2)}>
                {lang === 'id' ? 'Pratinjau →' : 'Preview →'}
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

function App() {
  const [authedUser, setAuthedUser] = React.useState(() => window.checkAuth ? window.checkAuth() : null);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [current, setCurrent] = React.useState('/dashboard');
  const [showEws, setShowEws] = React.useState(false);
  const [cmdkOpen, setCmdkOpen] = React.useState(false);
  const [notifOpen, setNotifOpen] = React.useState(false);
  const [profileOpen, setProfileOpen] = React.useState(false);

  const lang = t.language;
  const setLang = v => setTweak('language', v);

  const navigate = (route) => setCurrent(route);

  // ⌘K / Ctrl+K keyboard shortcut
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCmdkOpen(v => !v);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const handleCmdAction = (id) => {
    if (id === 'a:ews') setShowEws(true);
    else if (id === 'a:toggle-theme') setTweak('dark', !t.dark);
    else if (id === 'a:toggle-density') {
      const order = ['compact', 'regular', 'comfortable'];
      const i = order.indexOf(t.density);
      setTweak('density', order[(i + 1) % order.length]);
    }
  };

  const layers = {
    incidents: t.layerIncidents,
    ews: t.layerEws,
    territories: t.layerTerritories,
    risk: t.layerRisk,
    basemap: t.basemap,
  };
  const setLayers = (l) => setTweak({
    layerIncidents: l.incidents, layerEws: l.ews, layerTerritories: l.territories, layerRisk: l.risk, basemap: l.basemap,
  });

  // Apply theme + palette to document
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.dark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-density', t.density);
    const [primary, hover, wash] = t.palette;
    const hue = hexToHue(primary);
    document.documentElement.style.setProperty('--accent-hue', hue);
    document.documentElement.style.setProperty('--primary', primary);
    document.documentElement.style.setProperty('--primary-hover', hover);
    document.documentElement.style.setProperty('--primary-wash', wash);
  }, [t.dark, t.density, t.palette]);

  // Auto-collapse the main app sidebar on the immersive Dashboard GIS workspace.
  // Only force it on entry — once the user manually expands or collapses, respect
  // their choice for the rest of the session on that page.
  const prevRouteRef = React.useRef(current);
  React.useEffect(() => {
    if (prevRouteRef.current !== current && current === '/dashboard-gis' && !t.sidebarCollapsed) {
      setTweak('sidebarCollapsed', true);
    }
    prevRouteRef.current = current;
  }, [current, t.sidebarCollapsed, setTweak]);

  const renderModule = () => {
    switch (current) {
      case '/dashboard':
        return <DashboardModule lang={lang} layers={layers} setLayers={setLayers}
                 onOpenIncident={(inc) => setCurrent('/sitrep')}
                 onOpenEws={() => setShowEws(true)} />;
      case '/dashboard-gis':
        return <GisDashboardModule lang={lang} />;
      case '/incidents':
        return <IncidentsModule lang={lang} onOpen={() => setCurrent('/sitrep')} />;
      case '/sitrep':
        return <SitRepModule lang={lang} />;
      case '/donations':
        return <DonationsModule lang={lang} />;
      case '/transparency':
        return <TransparencyModule lang={lang} />;
      case '/ews':
        return <EwsModule lang={lang} onCompose={() => setShowEws(true)} />;
      case '/complaints':
        return <ComplaintsModule lang={lang} />;
      case '/api':
        return <ApiHubModule lang={lang} />;;
      case '/reports':
        return <AnalyticsModule lang={lang} />;
      case '/irb':
        return <IRBModule lang={lang} />;
      case '/community':
        return <CommunityModule lang={lang} />;
      case '/gis-admin':
        return <GisAdminModule lang={lang} />;
      case '/users':
        return <UsersModule lang={lang} />;
      case '/settings':
        return <SettingsModule lang={lang} />;
      case '/docs':
        return <DocsModule lang={lang} />;
      default:
        return <DashboardModule lang={lang} layers={layers} setLayers={setLayers} onOpenEws={() => setShowEws(true)} />;
    }
  };

  return (
    <>
      {!authedUser && <LoginGate onLoginSuccess={setAuthedUser} />}
      <Header lang={lang} setLang={setLang} current={current} setCurrent={navigate}
              sidebarCollapsed={t.sidebarCollapsed}
              setSidebarCollapsed={(v) => setTweak('sidebarCollapsed', v)}
              onOpenCmdk={() => setCmdkOpen(true)}
              onOpenNotif={() => { setNotifOpen(!notifOpen); setProfileOpen(false); }}
              onOpenProfile={() => { setProfileOpen(!profileOpen); setNotifOpen(false); }}
              notifOpen={notifOpen}
              profileOpen={profileOpen} />
      <div className="app-shell">
        <Sidebar lang={lang} current={current} setCurrent={navigate} collapsed={t.sidebarCollapsed} />
        <main className="main">
          {renderModule()}
        </main>
      </div>

      {showEws && <EwsBroadcastModal lang={lang} onClose={() => setShowEws(false)} />}

      <CommandPalette open={cmdkOpen} onClose={() => setCmdkOpen(false)} lang={lang}
                      onNavigate={navigate} onAction={handleCmdAction} />

      {notifOpen && <NotificationPanel lang={lang} onClose={() => setNotifOpen(false)} onNavigate={navigate} />}
      {profileOpen && <ProfileDropdown lang={lang} onClose={() => setProfileOpen(false)} onNavigate={navigate}
                                        onToggleTheme={() => setTweak('dark', !t.dark)} dark={t.dark} />}

      <TweaksPanel title="Tweaks · SIGAB">
        <TweakSection label={lang === 'id' ? 'Tampilan' : 'Appearance'}>
          <TweakColor label={lang === 'id' ? 'Palet' : 'Palette'} value={t.palette}
            options={PALETTES} onChange={(v) => setTweak('palette', v)} />
          <TweakToggle label={lang === 'id' ? 'Mode gelap' : 'Dark mode'} value={t.dark}
            onChange={(v) => setTweak('dark', v)} />
          <TweakRadio label={lang === 'id' ? 'Kepadatan' : 'Density'} value={t.density}
            options={['compact', 'regular', 'comfortable']}
            onChange={(v) => setTweak('density', v)} />
          <TweakToggle label={lang === 'id' ? 'Sidebar minimized' : 'Sidebar collapsed'} value={t.sidebarCollapsed}
            onChange={(v) => setTweak('sidebarCollapsed', v)} />
        </TweakSection>

        <TweakSection label={lang === 'id' ? 'Bahasa' : 'Language'}>
          <TweakRadio label="UI" value={t.language}
            options={[{ value: 'id', label: 'Indonesia' }, { value: 'en', label: 'English' }]}
            onChange={(v) => setTweak('language', v)} />
        </TweakSection>

        <TweakSection label={lang === 'id' ? 'Layer Peta' : 'Map Layers'}>
          <TweakToggle label={lang === 'id' ? 'Insiden' : 'Incidents'} value={t.layerIncidents}
            onChange={(v) => setTweak('layerIncidents', v)} />
          <TweakToggle label={lang === 'id' ? 'Peringatan dini' : 'Early warnings'} value={t.layerEws}
            onChange={(v) => setTweak('layerEws', v)} />
          <TweakToggle label={lang === 'id' ? 'Wilayah adat' : 'Indigenous areas'} value={t.layerTerritories}
            onChange={(v) => setTweak('layerTerritories', v)} />
          <TweakToggle label={lang === 'id' ? 'Heatmap risiko' : 'Risk heatmap'} value={t.layerRisk}
            onChange={(v) => setTweak('layerRisk', v)} />
          <TweakRadio label="Basemap" value={t.basemap}
            options={[{ value: 'street', label: 'Street' }, { value: 'satellite', label: 'Sat' }, { value: 'topo', label: 'Topo' }]}
            onChange={(v) => setTweak('basemap', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ConfirmDialogProvider>
    <App />
  </ConfirmDialogProvider>
);


</script>
</body>
</html>
