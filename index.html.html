// ── main module ──────────────────────────────────────────────────────────────

const GisDashboardModule = ({ lang }) => {
  const [vis, setVis] = React.useState(DEFAULT_VIS);
  const [opacity, setOpacity] = React.useState(DEFAULT_OPACITY);
  const [tool, setTool] = React.useState('select');
  const [displayMode, setDisplayMode] = React.useState('markers');
  const [selected, setSelected] = React.useState(null);
  const [timelinePos, setTimelinePos] = React.useState(135);
  const [playing, setPlaying] = React.useState(false);
  const [playSpeed, setPlaySpeed] = React.useState(1);
  const [timelineMin, setTimelineMin] = React.useState(false);
  const [cursorCoords, setCursorCoords] = React.useState(null);
  const [drawnFeatures, setDrawnFeatures] = React.useState([]);
  const [measurePoints, setMeasurePoints] = React.useState([]);
  const [bufferRadius, setBufferRadius] = React.useState(50);
  const [toast, setToast] = React.useState(null);
  const [layerPanelOpen, setLayerPanelOpen] = React.useState(true);
  const [insightsOpen, setInsightsOpen] = React.useState(true);
  const [moreOpen, setMoreOpen] = React.useState(false);

  const elRef = React.useRef(null);
  const mapRef = React.useRef(null);
  const layerGroups = React.useRef({});

  const setVisOne = (id, val) => setVis(v => ({ ...v, [id]: val ?? !v[id] }));
  const setBasemap = (id) => setVis(v => ({
    ...v,
    'basemap.street': false, 'basemap.satellite': false, 'basemap.topo': false,
    [id]: true,
  }));
  const setOpacityOne = (id, val) => setOpacity(o => ({ ...o, [id]: val }));

  const cutoffDate = React.useMemo(() => {
    const d = new Date(2026, 0, 1);
    d.setDate(d.getDate() + timelinePos);
    return d;
  }, [timelinePos]);

  const visibleIncidents = React.useMemo(() => {
    return ALL_GIS_INCIDENTS.filter(i => {
      if (!vis[`incidents.${i.type}`]) return false;
      if (new Date(i.reported) > cutoffDate) return false;
      return true;
    });
  }, [vis, cutoffDate]);

  // Insights
  const insights = React.useMemo(() => {
    const active = visibleIncidents.filter(i => i.status === 'active').length;
    const critical = visibleIncidents.filter(i => i.severity === 'critical' || i.severity === 'high').length;
    const affected = visibleIncidents.reduce((s, i) => s + (i.affected || 0), 0);
    const provinces = new Set(visibleIncidents.map(i => i.region.split(',').pop()?.trim())).size;
    return { total: visibleIncidents.length, active, critical, affected, provinces };
  }, [visibleIncidents]);

  // Playback
  React.useEffect(() => {
    if (!playing) return;
    const tick = setInterval(() => {
      setTimelinePos(p => {
        if (p >= 135) { setPlaying(false); return 135; }
        return Math.min(135, p + 2);
      });
    }, 90 / playSpeed);
    return () => clearInterval(tick);
  }, [playing, playSpeed]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  // ── leaflet init ────────────────────────────────────────────────────────────
  React.useEffect(() => {
    if (!elRef.current || mapRef.current) return;
    const map = L.map(elRef.current, {
      center: [-2.5, 117], zoom: 5, zoomControl: false, attributionControl: true,
    });
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    mapRef.current = map;

    map.on('mousemove', (e) => setCursorCoords([e.latlng.lat, e.latlng.lng]));
    map.on('mouseout', () => setCursorCoords(null));

    const ro = new ResizeObserver(() => mapRef.current && mapRef.current.invalidateSize());
    ro.observe(elRef.current);
    return () => { ro.disconnect(); map.remove(); mapRef.current = null; };
  }, []);

  // Basemap
  const tileRef = React.useRef(null);
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    const url = vis['basemap.satellite']
      ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
      : vis['basemap.topo']
      ? 'https://a.tile.opentopomap.org/{z}/{x}/{y}.png'
      : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
    if (tileRef.current) map.removeLayer(tileRef.current);
    tileRef.current = L.tileLayer(url, {
      attribution: vis['basemap.satellite'] ? 'Tiles © Esri' : '© OpenStreetMap', maxZoom: 18,
    }).addTo(map);
  }, [vis]);

  // Incidents / cluster / heatmap
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.incidents) map.removeLayer(layerGroups.current.incidents);

    if (displayMode === 'heatmap' && window.L.heatLayer) {
      const points = visibleIncidents.map(i => [i.coords[0], i.coords[1],
        ({ critical: 1.0, high: 0.75, medium: 0.5, low: 0.3 }[i.severity] || 0.4)]);
      const heat = L.heatLayer(points, {
        radius: 28, blur: 22, maxZoom: 10,
        gradient: { 0.2: '#3a7a4f', 0.4: '#b5933a', 0.6: '#d99a30', 0.8: '#c94c2e', 1.0: '#a63426' },
      });
      heat.addTo(map);
      layerGroups.current.incidents = heat;
      return;
    }

    const group = displayMode === 'cluster' && window.L.markerClusterGroup
      ? L.markerClusterGroup({
          spiderfyOnMaxZoom: true, showCoverageOnHover: false, maxClusterRadius: 50,
          iconCreateFunction: (cluster) => {
            const c = cluster.getChildCount();
            return L.divIcon({
              html: `<div style="background:var(--primary);color:white;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:13px;border:3px solid white;box-shadow:0 4px 10px rgba(0,0,0,.25)">${c}</div>`,
              className: '', iconSize: [36, 36], iconAnchor: [18, 18],
            });
          },
        })
      : L.layerGroup();

    const TYPE_COLOR = { banjir: '#3b7dd8', karhutla: '#c94c2e', gempa: '#6b4ea0', longsor: '#a06a30', kekeringan: '#b5933a' };
    const TYPE_SYM = { banjir: '≈', karhutla: '🔥', gempa: '~', longsor: '△', kekeringan: '☀' };

    visibleIncidents.forEach(inc => {
      const color = TYPE_COLOR[inc.type] || '#666';
      const size = inc.severity === 'critical' ? 32 : inc.severity === 'high' ? 28 : 24;
      const op = opacity[`incidents.${inc.type}`] ?? 1;
      const icon = L.divIcon({
        className: '',
        html: `<div class="aman-marker" style="background:${color};width:${size}px;height:${size}px;opacity:${op}"><div>${TYPE_SYM[inc.type] || '!'}</div></div>`,
        iconSize: [size, size], iconAnchor: [size / 2, size],
      });
      const m = L.marker(inc.coords, { icon });
      m.on('click', () => setSelected({ kind: 'incident', data: inc }));
      group.addLayer(m);
    });

    group.addTo(map);
    layerGroups.current.incidents = group;
  }, [visibleIncidents, displayMode, opacity]);

  // EWS warning zones
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.ews) map.removeLayer(layerGroups.current.ews);
    const group = L.layerGroup();
    AMAN_DATA.ewsAlerts.forEach(a => {
      const key = `ews.${a.severity === 'high' || a.severity === 'critical' ? 'high' : 'medium'}`;
      if (!vis[key]) return;
      const op = opacity[key] ?? 1;
      const color = a.severity === 'high' ? '#c94c2e' : '#d99a30';
      const c = L.circle(a.coords, {
        radius: a.severity === 'high' ? 180000 : 100000,
        color, fillColor: color, fillOpacity: 0.08 * op, weight: 1.5 * op, dashArray: '6 4', opacity: op,
      });
      c.on('click', () => setSelected({ kind: 'ews', data: a }));
      group.addLayer(c);
    });
    group.addTo(map);
    layerGroups.current.ews = group;
  }, [vis, opacity]);

  // Territories
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.territories) map.removeLayer(layerGroups.current.territories);
    if (!vis.territories) return;
    const group = L.layerGroup();
    const op = opacity.territories ?? 0.7;
    const polygons = [
      { name: 'Wilayah Adat Dayak Iban', comm: 'Dayak Iban', coords: [[1.6, 112], [1.6, 114], [0.2, 114.2], [0.0, 112.4]], area: 8420, pop: 12400 },
      { name: 'Wilayah Adat Petalangan', comm: 'Petalangan', coords: [[1, 102], [1, 103.5], [-0.3, 103.5], [-0.3, 102]], area: 6240, pop: 8800 },
      { name: 'Wilayah Adat Kaili', comm: 'Kaili', coords: [[-0.2, 119], [-0.2, 120.3], [-1.5, 120.3], [-1.5, 119]], area: 4180, pop: 6200 },
      { name: 'Wilayah Adat Marapu', comm: 'Marapu', coords: [[-9.3, 119.8], [-9.3, 121], [-10.4, 121], [-10.4, 119.8]], area: 3920, pop: 5400 },
      { name: 'Wilayah Adat Mentawai', comm: 'Mentawai', coords: [[-1.2, 98.8], [-1.2, 100], [-3.2, 100], [-3.2, 98.8]], area: 5840, pop: 4600 },
    ];
    polygons.forEach(p => {
      const poly = L.polygon(p.coords, {
        color: '#3a7a4f', weight: 2, fillColor: '#3a7a4f', fillOpacity: 0.15 * op, dashArray: '4 4', opacity: op,
      });
      poly.on('click', () => setSelected({ kind: 'territory', data: p }));
      group.addLayer(poly);
    });
    group.addTo(map);
    layerGroups.current.territories = group;
  }, [vis, opacity]);

  // Risk heatmap
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.risk) map.removeLayer(layerGroups.current.risk);
    if (!vis.risk) return;
    const op = opacity.risk ?? 0.8;
    const group = L.layerGroup();
    const zones = [
      [0.5, 113, 0.85], [0.2, 102.5, 0.78], [-0.7, 119.7, 0.62],
      [-0.8, 100.6, 0.5], [-9.7, 120.2, 0.55], [-3.3, 104.4, 0.45],
    ];
    zones.forEach(([lat, lon, v]) => {
      for (let i = 3; i > 0; i--) {
        const c = L.circle([lat, lon], {
          radius: 220000 * v * (i / 3),
          color: 'transparent',
          fillColor: v > 0.7 ? '#c94c2e' : v > 0.5 ? '#d99a30' : '#3a7a4f',
          fillOpacity: 0.10 * op, weight: 0, interactive: false,
        });
        group.addLayer(c);
      }
    });
    group.addTo(map);
    layerGroups.current.risk = group;
  }, [vis, opacity]);

  // Drawn / Measure / Buffer (unchanged from previous)
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.drawn) map.removeLayer(layerGroups.current.drawn);
    const group = L.layerGroup();
    drawnFeatures.forEach((f, i) => {
      if (f.type === 'polygon' && f.points.length >= 3) {
        const p = L.polygon(f.points, { color: 'var(--primary)', weight: 2, fillColor: 'var(--primary)', fillOpacity: 0.2 });
        p.on('click', () => setSelected({ kind: 'drawn', data: f, index: i }));
        group.addLayer(p);
      } else {
        f.points.forEach(pt => group.addLayer(L.circleMarker(pt, { radius: 5, color: 'var(--primary)', fillColor: 'white', fillOpacity: 1, weight: 2 })));
      }
    });
    group.addTo(map);
    layerGroups.current.drawn = group;
  }, [drawnFeatures]);

  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.measure) map.removeLayer(layerGroups.current.measure);
    if (measurePoints.length === 0) return;
    const group = L.layerGroup();
    measurePoints.forEach(pt => group.addLayer(L.circleMarker(pt, { radius: 4, color: '#c94c2e', fillColor: 'white', fillOpacity: 1, weight: 2 })));
    if (measurePoints.length >= 2) group.addLayer(L.polyline(measurePoints, { color: '#c94c2e', weight: 2, dashArray: '5 5' }));
    group.addTo(map);
    layerGroups.current.measure = group;
  }, [measurePoints]);

  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.buffer) map.removeLayer(layerGroups.current.buffer);
    if (tool !== 'buffer' || !selected || selected.kind !== 'incident') return;
    const buf = L.circle(selected.data.coords, {
      radius: bufferRadius * 1000, color: 'var(--primary)', fillColor: 'var(--primary)',
      fillOpacity: 0.1, weight: 2, dashArray: '5 5',
    });
    buf.addTo(map);
    layerGroups.current.buffer = buf;
  }, [tool, selected, bufferRadius]);

  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    const onClick = (e) => {
      const pt = [e.latlng.lat, e.latlng.lng];
      if (tool === 'draw') {
        setDrawnFeatures(prev => {
          const last = prev[prev.length - 1];
          if (last && !last.finished) return [...prev.slice(0, -1), { ...last, points: [...last.points, pt] }];
          return [...prev, { type: 'polygon', points: [pt], finished: false }];
        });
      } else if (tool === 'measure') {
        setMeasurePoints(prev => prev.length >= 2 ? [pt] : [...prev, pt]);
      }
    };
    const onDouble = () => {
      if (tool === 'draw') {
        setDrawnFeatures(prev => {
          const last = prev[prev.length - 1];
          if (last && !last.finished) return [...prev.slice(0, -1), { ...last, finished: true }];
          return prev;
        });
      }
    };
    map.on('click', onClick);
    map.on('dblclick', onDouble);
    return () => { map.off('click', onClick); map.off('dblclick', onDouble); };
  }, [tool]);

  const haversine = (a, b) => {
    const R = 6371;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(b[0] - a[0]);
    const dLon = toRad(b[1] - a[1]);
    const h = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(a[0])) * Math.cos(toRad(b[0])) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(h));
  };

  const measureDist = measurePoints.length >= 2 ? haversine(measurePoints[0], measurePoints[1]) : 0;
  const monthLabel = (m) => lang === 'id' ? m.label : (m.label_en || m.label);

  return (
    <>
      <div style={{ position: 'relative', flex: 1, minHeight: 0, overflow: 'hidden' }}>
        {/* MAP fills entire area */}

          position: 'absolute', inset: 0,

        }}></div>

        {/* ═══ TOP TOOLBAR — grouped command sections ═══ */}
        <div className="gis-glass" style={{
          position: 'absolute', top: 14, left: 14, right: 14, zIndex: 500,
          display: 'flex', alignItems: 'center', padding: '6px 10px', gap: 6,
          height: 46,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0, paddingRight: 8 }}>
            <span style={{
              width: 22, height: 22, borderRadius: 6, background: 'var(--primary)',
              color: 'white', display: 'grid', placeItems: 'center', fontWeight: 800, fontSize: 10, letterSpacing: '-0.04em',
            }}>GIS</span>
            <span style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--fg)', whiteSpace: 'nowrap' }}>
              {lang === 'id' ? 'Workspace' : 'Workspace'}
            </span>
          </div>

          <div className="gis-divider"></div>

          {/* Primary tools */}
          <div style={{ display: 'flex', gap: 2, flexShrink: 0 }}>
            {TOOL_GROUPS[0].tools.map(t => (
              <button key={t.id}
                className={'gis-tool-btn' + (tool === t.id ? ' active' : '')}
                onClick={() => {
                  setTool(t.id);
                  if (t.id === 'draw') showToast(lang === 'id' ? 'Klik untuk vertex, double-click selesai' : 'Click vertex, double-click to finish');
                }}>
                <Icon name={t.icon} size={13} />
                <span className="lbl">{lang === 'id' ? t.label_id : t.label}</span>
              </button>
            ))}
          </div>

          <div className="gis-divider"></div>

          {/* Analysis tools */}
          <div style={{ display: 'flex', gap: 2, flexShrink: 0 }}>
            {TOOL_GROUPS[1].tools.map(t => (
              <button key={t.id}
                className={'gis-tool-btn' + (tool === t.id ? ' active' : '')}
                onClick={() => {
                  setTool(t.id);
                  if (t.id === 'measure') setMeasurePoints([]);
                  if (t.id === 'buffer' && (!selected || selected.kind !== 'incident')) showToast(lang === 'id' ? 'Pilih insiden dulu' : 'Select an incident first');
                }}>
                <Icon name={t.icon} size={13} />
                <span className="lbl">{lang === 'id' ? t.label_id : t.label}</span>
              </button>
            ))}
          </div>

          <div className="gis-divider"></div>

          {/* Visualization mode — segmented control */}
          <div className="seg-ctl" style={{ flexShrink: 0 }}>
            {[
              { id: 'markers', label: lang === 'id' ? 'Marker' : 'Markers' },
              { id: 'heatmap', label: 'Heatmap' },
              { id: 'cluster', label: 'Cluster' },
            ].map(m => (
              <button key={m.id} className={displayMode === m.id ? 'active' : ''} onClick={() => setDisplayMode(m.id)}>

              </button>

          {/* Inline tool status */}
          {tool === 'coord' && cursorCoords && (
            <div className="tag-mono" style={{ fontSize: 11, color: 'var(--primary)', fontWeight: 600, marginLeft: 4, flexShrink: 0 }}>
              {cursorCoords[0].toFixed(4)}, {cursorCoords[1].toFixed(4)}
            </div>
          )}
          {tool === 'measure' && measurePoints.length >= 2 && (
            <div className="tag-mono" style={{ fontSize: 11.5, color: 'var(--danger)', fontWeight: 700, marginLeft: 4, flexShrink: 0 }}>
              ↔ {measureDist.toFixed(2)} km

            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginLeft: 4, flexShrink: 0 }}>

            <span className="lbl">{lang === 'id' ? 'Bersihkan' : 'Clear'}</span>

            <span className="lbl">Export</span>
          </button>

          {/* Overflow menu */}
          <div style={{ position: 'relative', flexShrink: 0 }}>
            <button className="gis-tool-btn" onClick={() => setMoreOpen(!moreOpen)}>
              <span style={{ letterSpacing: 0, fontSize: 16, lineHeight: 1, paddingBottom: 2 }}>⋯</span>
            </button>
            {moreOpen && (
              <div onMouseLeave={() => setMoreOpen(false)} style={{
                position: 'absolute', top: 'calc(100% + 8px)', right: 0,

              }}>
                {[
                  { icon: 'photo', label: lang === 'id' ? 'Snapshot peta' : 'Map snapshot' },
                  { icon: 'pin', label: lang === 'id' ? 'Pin lokasi saya' : 'Pin my location' },
                  { icon: 'sparkle', label: lang === 'id' ? 'Analisis spasial…' : 'Spatial analysis…' },
                  { icon: 'db', label: lang === 'id' ? 'Sumber data WMS/WFS' : 'WMS/WFS sources' },
                  { icon: 'settings', label: lang === 'id' ? 'Pengaturan peta' : 'Map settings' },
                ].map((m, i) => (
                  <button key={i} className="gis-tool-btn" style={{ width: '100%', justifyContent: 'flex-start', height: 32 }}
                    onClick={() => { setMoreOpen(false); showToast(m.label); }}>
                    <Icon name={m.icon} size={13} />
                    <span style={{ display: 'inline' }}>{m.label}</span>
                  </button>

            )}
          </div>
        </div>

        {/* ═══ LAYER PANEL (left) — Show/Hide like Insight ═══ */}
        <div style={{
          position: 'absolute', top: 74, left: 14, zIndex: 500,
          display: 'flex', flexDirection: 'column', gap: 8,
        }}>
          {layerPanelOpen ? (
            <aside className="gis-glass" style={{
              width: 264, maxHeight: 'calc(100vh - 240px)',
              display: 'flex', flexDirection: 'column', overflow: 'hidden',
              animation: 'slideInRight .2s ease',
            }}>
              <div style={{
                padding: '10px 12px', borderBottom: '1px solid var(--border)',
                display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0,
              }}>
                <Icon name="layers" size={13} style={{ color: 'var(--fg-muted)' }} />
                <div style={{ flex: 1, fontSize: 10.5, fontWeight: 700, letterSpacing: 0.06, textTransform: 'uppercase', color: 'var(--fg)' }}>
                  Layers
                </div>
                <button className="gis-tool-btn" style={{ height: 22, padding: '0 6px', fontSize: 10.5 }}

                </button>
                <button onClick={() => setLayerPanelOpen(false)} style={{
                  border: 0, background: 'transparent', width: 18, height: 18,
                  color: 'var(--fg-muted)', cursor: 'pointer', display: 'grid', placeItems: 'center',

                  <Icon name="x" size={11} />
                </button>
              </div>
              <div className="scroll" style={{ flex: 1, overflowY: 'auto', padding: '6px 4px', minHeight: 0 }}>
                {LAYER_TREE.map(node => (
                  <LayerGroup key={node.id} node={node} depth={0}

                    onToggle={setVisOne} onOpacity={setOpacityOne} onBasemap={setBasemap}
                    lang={lang} source={visibleIncidents} />
                ))}
              </div>
              <div style={{
                padding: '8px 12px', borderTop: '1px solid var(--border)',
                background: 'var(--bg-subtle)', fontSize: 10.5, color: 'var(--fg-muted)',
                display: 'flex', justifyContent: 'space-between', flexShrink: 0,
              }}>
                <span><span style={{ fontWeight: 700, color: 'var(--fg)' }}>{visibleIncidents.length}</span> visible</span>
                <span style={{ color: 'var(--primary)', fontWeight: 700 }}>{displayMode}</span>
              </div>
            </aside>
          ) : (
            <button onClick={() => setLayerPanelOpen(true)} className="gis-glass" style={{
              width: 40, height: 40, border: 0, cursor: 'pointer',
              display: 'grid', placeItems: 'center', color: 'var(--fg-muted)',
            }} title={lang === 'id' ? 'Tampilkan layer' : 'Show layers'}>
              <Icon name="layers" size={16} />
            </button>
          )}
        </div>

        {/* ═══ INSIGHT CARDS (top-right) ═══ */}
        <div style={{
          position: 'absolute', top: 74, right: 14, zIndex: 500,

          animation: 'slideInRight .25s ease',
        }}>
          {insightsOpen ? (
            <div className="gis-glass" style={{ padding: 10, width: 320 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 4px 8px' }}>
                <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 0.06, textTransform: 'uppercase', color: 'var(--fg)' }}>
                  {lang === 'id' ? 'Insight Operasional' : 'Operational Insight'}

                <button onClick={() => setInsightsOpen(false)} style={{
                  border: 0, background: 'transparent', width: 18, height: 18,
                  color: 'var(--fg-muted)', cursor: 'pointer', display: 'grid', placeItems: 'center',

              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                <div className="insight-card">
                  <span className="lbl">{lang === 'id' ? 'Total Insiden' : 'Total Incidents'}</span>
                  <span className="val">{insights.total}</span>
                  <span className="delta"><span style={{ color: 'var(--ok)' }}>↑ {Math.max(0, insights.total - 8)}</span> {lang === 'id' ? '7 hari' : '7d'}</span>
                </div>
                <div className="insight-card">
                  <span className="lbl">{lang === 'id' ? 'Aktif' : 'Active'}</span>
                  <span className="val" style={{ color: 'var(--danger)' }}>{insights.active}</span>
                  <span className="delta">{lang === 'id' ? 'butuh respons' : 'need response'}</span>
                </div>
                <div className="insight-card">
                  <span className="lbl">{lang === 'id' ? 'Kritis & Tinggi' : 'Critical+High'}</span>
                  <span className="val" style={{ color: 'var(--warn)' }}>{insights.critical}</span>
                  <span className="delta">{insights.total > 0 ? Math.round(insights.critical / insights.total * 100) : 0}% {lang === 'id' ? 'dari total' : 'of total'}</span>
                </div>
                <div className="insight-card">
                  <span className="lbl">{lang === 'id' ? 'Provinsi' : 'Provinces'}</span>
                  <span className="val">{insights.provinces}</span>
                  <span className="delta">{insights.affected.toLocaleString('id-ID')} {lang === 'id' ? 'jiwa' : 'people'}</span>
                </div>
              </div>
              <div style={{
                marginTop: 8, padding: '8px 10px', background: 'var(--primary-wash)',
                borderRadius: 6, display: 'flex', alignItems: 'center', gap: 8,
              }}>
                <Icon name="sparkle" size={12} style={{ color: 'var(--primary)' }} />
                <span style={{ fontSize: 10.5, color: 'var(--primary)', fontWeight: 600, flex: 1 }}>
                  {insights.critical > 0 && insights.critical >= insights.total * 0.3
                    ? (lang === 'id' ? 'Eskalasi tinggi terdeteksi' : 'High escalation detected')

                </span>
              </div>
            </div>
          ) : (
            <button onClick={() => setInsightsOpen(true)} className="gis-glass" style={{
              width: 40, height: 40, border: 0, cursor: 'pointer',
              display: 'grid', placeItems: 'center', color: 'var(--fg-muted)',
            }} title={lang === 'id' ? 'Tampilkan insight' : 'Show insights'}>
              <Icon name="chartBar" size={16} />
            </button>
          )}
        </div>

        {/* ═══ SPATIAL INSPECTOR (right, below insights when selected) ═══ */}
        {selected && (
          <aside className="gis-glass" style={{
            position: 'absolute',
            top: insightsOpen ? 280 : 74,
            right: 14, zIndex: 500,
            width: 300, maxHeight: insightsOpen ? 'calc(100% - 430px)' : 'calc(100% - 220px)',
            display: 'flex', flexDirection: 'column', overflow: 'hidden',
            animation: 'slideInRight .2s ease',
          }}>
            <div style={{ padding: '10px 12px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 0.06, textTransform: 'uppercase' }}>
                Inspector
              </div>
              <button className="gis-tool-btn" style={{ width: 22, height: 22, padding: 0 }}
                onClick={() => setSelected(null)}>
                <Icon name="x" size={11} />
              </button>
            </div>
            <div className="scroll" style={{ flex: 1, overflowY: 'auto', minHeight: 0 }}>
              {selected.kind === 'incident' && <IncidentInspector lang={lang} inc={selected.data} buffer={bufferRadius} />}
              {selected.kind === 'ews' && <EwsInspector lang={lang} alert={selected.data} />}
              {selected.kind === 'territory' && <TerritoryInspector lang={lang} t={selected.data} />}
              {selected.kind === 'drawn' && <DrawnInspector lang={lang} f={selected.data} idx={selected.index} />}
            </div>
          </aside>
        )}

        {/* ═══ TIMELINE (bottom) ═══ */}
        <div className="gis-glass" style={{
          position: 'absolute', bottom: 14, left: '50%', transform: 'translateX(-50%)',
          width: timelineMin ? 'auto' : 'min(calc(100% - 28px), 820px)', zIndex: 500,
          padding: timelineMin ? '6px 10px' : '8px 14px',
          display: 'flex', flexDirection: 'column', gap: 4,
        }}>
          {timelineMin ? (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <button onClick={() => setPlaying(!playing)} style={{
                width: 24, height: 24, borderRadius: '50%', border: 0,
                background: playing ? 'var(--danger)' : 'var(--primary)', color: 'white',
                display: 'grid', placeItems: 'center', cursor: 'pointer',
              }}>{playing ? <span style={{ fontSize: 9 }}>■</span> : <span style={{ fontSize: 9 }}>▶</span>}</button>
              <span className="tag-mono" style={{ fontSize: 11, color: 'var(--primary)', fontWeight: 600 }}>
                {cutoffDate.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'short', year: '2-digit' })}
              </span>
              <button onClick={() => setTimelineMin(false)} className="gis-tool-btn" style={{ height: 24, padding: '0 6px' }}>
                <span style={{ fontSize: 12 }}>↗</span>
              </button>
            </div>
          ) : (
            <>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <button onClick={() => setPlaying(!playing)} style={{
                  width: 26, height: 26, borderRadius: '50%', border: 0,
                  background: playing ? 'var(--danger)' : 'var(--primary)', color: 'white',
                  display: 'grid', placeItems: 'center', flexShrink: 0, cursor: 'pointer',
                }}>{playing ? <span style={{ fontSize: 10 }}>■</span> : <span style={{ fontSize: 10 }}>▶</span>}</button>

                <button onClick={() => { setPlaying(false); setTimelinePos(0); }} className="gis-tool-btn" style={{ height: 24, padding: '0 6px' }} title={lang === 'id' ? 'Mulai ulang' : 'Replay'}>
                  <Icon name="refresh" size={10} />
                </button>
                <button onClick={() => { setTimelinePos(135); setPlaying(false); }} className="gis-tool-btn" style={{ height: 24, padding: '0 6px' }} title={lang === 'id' ? 'Live' : 'Live'}>
                  <span className="pulse-marker" style={{ width: 5, height: 5, background: 'var(--danger)' }}></span>
                  <span style={{ fontSize: 10, fontWeight: 700 }}>LIVE</span>
                </button>

                <div className="seg-ctl" style={{ marginLeft: 4 }}>
                  {[0.5, 1, 2, 4].map(s => (
                    <button key={s} className={playSpeed === s ? 'active' : ''} onClick={() => setPlaySpeed(s)} style={{ padding: '0 8px', fontSize: 10.5 }}>
                      {s}×
                    </button>
                  ))}
                </div>

                <div style={{ flex: 1, fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', textAlign: 'center', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  <span className="tag-mono" style={{ color: 'var(--primary)', fontWeight: 700 }}>
                    {cutoffDate.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'short', year: 'numeric' })}
                  </span>
                  <span style={{ marginLeft: 8 }}>· <strong style={{ color: 'var(--fg)' }}>{visibleIncidents.length}</strong> {lang === 'id' ? 'insiden' : 'incidents'}</span>
                </div>

                <button onClick={() => setTimelineMin(true)} className="gis-tool-btn" style={{ width: 22, height: 22, padding: 0 }} title={lang === 'id' ? 'Kecilkan' : 'Minimize'}>
                  <span style={{ fontSize: 14, lineHeight: 1, color: 'var(--fg-muted)' }}>−</span>
                </button>
              </div>

              <div style={{ position: 'relative', height: 18, marginTop: 2 }}>
                <input type="range" min={0} max={135} value={timelinePos}
                  onChange={e => { setPlaying(false); setTimelinePos(Number(e.target.value)); }}
                  style={{
                    position: 'absolute', inset: 0, width: '100%', height: '100%',
                    WebkitAppearance: 'none', appearance: 'none',
                    background: 'transparent', cursor: 'pointer', zIndex: 2, margin: 0,
                  }} />
                <div style={{
                  position: 'absolute', left: 0, right: 0, top: '50%', height: 4,
                  background: 'var(--bg-subtle)', borderRadius: 999, transform: 'translateY(-50%)',
                }}></div>
                <div style={{
                  position: 'absolute', left: 0, top: '50%', height: 4, width: (timelinePos / 135 * 100) + '%',
                  background: 'linear-gradient(to right, var(--ok), var(--warn), var(--danger))',
                  borderRadius: 999, transform: 'translateY(-50%)',
                }}></div>
                {TIMELINE_MONTHS.map(m => {
                  const pos = (m.idx * 30 / 135) * 100;
                  return (
                    <div key={m.idx} style={{
                      position: 'absolute', left: pos + '%', top: '50%',
                      transform: 'translate(-50%, -50%)',
                      width: 6, height: 6, borderRadius: '50%',
                      background: 'var(--bg-elev)', border: '1.5px solid var(--border-strong)',
                      pointerEvents: 'none',
                    }}></div>
                  );
                })}
                <div style={{
                  position: 'absolute', left: (timelinePos / 135 * 100) + '%', top: '50%',
                  transform: 'translate(-50%, -50%)',
                  width: 12, height: 12, borderRadius: '50%',
                  background: 'var(--primary)', border: '2.5px solid var(--bg-elev)',
                  boxShadow: '0 2px 4px rgba(0,0,0,0.2)',
                  pointerEvents: 'none',
                }}></div>
              </div>
              <div style={{ position: 'relative', height: 10 }}>
                {TIMELINE_MONTHS.map(m => {
                  const pos = (m.idx * 30 / 135) * 100;
                  return (
                    <div key={m.idx} style={{
                      position: 'absolute', left: pos + '%', transform: 'translateX(-50%)',
                      fontSize: 9.5, fontWeight: 600, color: 'var(--fg-muted)', letterSpacing: -0.01,
                    }}>{monthLabel(m)}</div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      </div>

      {toast && (
        <div style={{
          position: 'fixed', bottom: 96, left: '50%', transform: 'translateX(-50%)',
          background: 'var(--green-900)', color: 'white', padding: '8px 16px', borderRadius: 8,
          fontSize: 12, display: 'flex', gap: 8, alignItems: 'center', zIndex: 9999,
          boxShadow: '0 10px 30px rgba(0,0,0,0.2)',
        }}>
          <Icon name="check" size={13} />{toast}
        </div>
      )}
    </>
  );
};

// ── inspectors ───────────────────────────────────────────────────────────────

function IncidentInspector({ lang, inc, buffer }) {
  const sevColor = inc.severity === 'critical' ? 'var(--danger)' : inc.severity === 'high' ? 'var(--warn)' : inc.severity === 'medium' ? 'var(--info)' : 'var(--fg-muted)';
  return (
    <div style={{ padding: 14 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
        <span style={{ width: 32, height: 32, borderRadius: 7, background: sevColor, color: 'white', display: 'grid', placeItems: 'center', fontWeight: 800, flexShrink: 0 }}>
          {({ banjir: '≈', karhutla: '🔥', gempa: '~', longsor: '△', kekeringan: '☀' })[inc.type] || '!'}
        </span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="tag-mono" style={{ fontSize: 9.5 }}>{inc.id}</div>
          <div style={{ fontSize: 9, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: 0.05 }}>Incident</div>
        </div>
      </div>
      <h3 style={{ margin: '4px 0 10px', fontSize: 14, fontWeight: 700, lineHeight: 1.3 }}>
        {lang === 'id' ? inc.title : inc.title_en}
      </h3>

      <div style={{ fontSize: 11.5 }}>
        {[
          { label: 'Severity', value: <span className={'chip ' + (inc.severity === 'critical' ? 'danger' : inc.severity === 'high' ? 'warn' : 'info')} style={{ fontSize: 10 }}>{AMAN_DATA.t[lang][inc.severity]}</span> },
          { label: lang === 'id' ? 'Victim' : 'Victim', value: <span style={{ fontWeight: 700, fontVariantNumeric: 'tabular-nums', fontSize: 12.5 }}>{inc.affected.toLocaleString('id-ID')}</span> },
          { label: 'KK', value: inc.households },
          { label: 'Village', value: <span style={{ fontSize: 11 }}>{inc.region}</span> },
          { label: 'Community', value: <span style={{ fontSize: 11 }}>{inc.community}</span> },
          { label: 'Status', value: <span className={'chip ' + (inc.status === 'active' ? 'danger' : inc.status === 'verified' ? 'info' : inc.status === 'resolved' ? 'ok' : '')} style={{ fontSize: 10 }}>{AMAN_DATA.t[lang][inc.status] || inc.status}</span> },
          { label: 'Updated', value: timeAgo(inc.updated) },
          { label: 'Coords', value: <span className="tag-mono" style={{ fontSize: 10 }}>{inc.coords[0].toFixed(3)}, {inc.coords[1].toFixed(3)}</span> },
          { label: 'Buffer', value: <span className="tag-mono" style={{ fontSize: 10 }}>{buffer}km · ~{(Math.PI * buffer * buffer).toFixed(0)} km²</span> },
        ].map((r, i) => (
          <div key={i} style={{
            display: 'grid', gridTemplateColumns: '70px 1fr', alignItems: 'center',
            padding: '5px 0', borderBottom: '1px solid var(--border)',
          }}>
            <div style={{ color: 'var(--fg-muted)', fontSize: 10.5, fontWeight: 500 }}>{r.label}</div>
            <div style={{ fontWeight: 500 }}>{r.value}</div>
          </div>
        ))}
      </div>

      <div style={{ marginTop: 10, display: 'flex', gap: 6 }}>
        <button className="btn sm primary" style={{ flex: 1 }}><Icon name="paper" size={11} />SitRep</button>
        <button className="btn sm" style={{ flex: 1 }}><Icon name="send" size={11} />Assign</button>
      </div>
    </div>
  );
}

function EwsInspector({ lang, alert }) {
  return (
    <div style={{ padding: 14 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
        <span className="pulse-marker" style={{ width: 8, height: 8, background: alert.severity === 'high' ? 'var(--danger)' : 'var(--warn)' }}></span>
        <span style={{ fontSize: 9, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: 0.05 }}>
          EWS · {alert.source}
        </span>
      </div>
      <h3 style={{ margin: '4px 0 8px', fontSize: 14, fontWeight: 700, lineHeight: 1.3 }}>{alert.type}</h3>
      <div style={{ padding: '8px 10px', background: 'var(--warn-bg)', color: 'var(--warn)', borderRadius: 6, fontSize: 11.5, lineHeight: 1.5, marginBottom: 10 }}>
        {alert.message}
      </div>
      <div style={{ fontSize: 11.5 }}>
        {[
          { label: 'Region', value: alert.region },
          { label: 'Severity', value: alert.severity },
          { label: 'Valid', value: alert.valid },
          { label: 'Issued', value: timeAgo(alert.time) },
          { label: 'ID', value: <span className="tag-mono" style={{ fontSize: 10 }}>{alert.id}</span> },
        ].map((r, i) => (

};

const IncidentsModule = ({ lang, onOpen }) => {
  const [search, setSearch] = React.useState('');
  const [typeFilter, setTypeFilter] = React.useState(new Set());
  const [statusFilter, setStatusFilter] = React.useState(new Set());
  const [severityFilter, setSeverityFilter] = React.useState(new Set());
  const [sortBy, setSortBy] = React.useState('updated');
  const [sortDir, setSortDir] = React.useState('desc');
  const [selected, setSelected] = React.useState(new Set());

  const incidents = ALL_INCIDENTS();

  const toggleSet = (set, val, fn) => {
    const next = new Set(set);
    if (next.has(val)) next.delete(val); else next.add(val);
    fn(next);
  };

  const filtered = incidents.filter(i => {
    if (search && !`${i.title} ${i.region} ${i.community} ${i.id}`.toLowerCase().includes(search.toLowerCase())) return false;
    if (typeFilter.size && !typeFilter.has(i.type)) return false;
    if (statusFilter.size && !statusFilter.has(i.status)) return false;
    if (severityFilter.size && !severityFilter.has(i.severity)) return false;
    return true;
  });

  const sorted = [...filtered].sort((a, b) => {
    const sevOrder = { critical: 4, high: 3, medium: 2, low: 1 };
    let av = a[sortBy], bv = b[sortBy];
    if (sortBy === 'severity') { av = sevOrder[a.severity]; bv = sevOrder[b.severity]; }
    if (sortBy === 'updated' || sortBy === 'reported') { av = new Date(av).getTime(); bv = new Date(bv).getTime(); }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const handleSort = (col) => {
    if (sortBy === col) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir('desc'); }
  };

  const sortArrow = (col) => sortBy === col ? (sortDir === 'asc' ? '↑' : '↓') : <span style={{ opacity: 0.3 }}>↕</span>;

  const toggleAll = () => {
    if (selected.size === sorted.length) setSelected(new Set());
    else setSelected(new Set(sorted.map(s => s.id)));
  };

  const allChecked = selected.size === sorted.length && sorted.length > 0;
  const partChecked = selected.size > 0 && selected.size < sorted.length;

  const counts = {
    active: incidents.filter(i => i.status === 'active').length,
    verified: incidents.filter(i => i.status === 'verified').length,
    resolved: incidents.filter(i => i.status === 'resolved').length,
    archived: incidents.filter(i => i.status === 'archived').length,

    <button onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '5px 11px', borderRadius: 999, fontSize: 11.5, fontWeight: 600,

      background: active ? 'var(--primary-wash)' : 'var(--bg-elev)',
      color: active ? 'var(--primary)' : 'var(--fg-muted)',
    }}>
      {children}

    </button>
  );

  return (
    <>
      <div className="page-head">
        <div>
          <div className="crumbs">
            {lang === 'id' ? 'Operasional' : 'Operational'} <span style={{margin: '0 6px'}}>/</span> {lang === 'id' ? 'Daftar Insiden' : 'Incidents'}
          </div>
          <h1>{lang === 'id' ? 'Daftar Insiden' : 'Incidents'}</h1>
          <div className="sub-label">
            {lang === 'id'
              ? `${incidents.length} insiden tercatat · ${counts.active} aktif · ${counts.verified} menunggu respons`
              : `${incidents.length} recorded · ${counts.active} active · ${counts.verified} awaiting response`}
          </div>
        </div>
        <div className="actions">
          <button className="btn"><Icon name="download" />{lang === 'id' ? 'Ekspor CSV' : 'Export CSV'}</button>
          <button className="btn"><Icon name="filter" />{lang === 'id' ? 'Filter Lanjutan' : 'Advanced'}</button>
          <button className="btn primary"><Icon name="plus" />{lang === 'id' ? 'Lapor Insiden' : 'Report Incident'}</button>
        </div>
      </div>

      {/* Status tabs */}
      <div style={{ display: 'flex', gap: 4, padding: '12px 24px 0', borderBottom: '1px solid var(--border)' }}>
        {[
          { id: 'all', label: lang === 'id' ? 'Semua' : 'All', count: incidents.length },
          { id: 'active', label: lang === 'id' ? 'Aktif' : 'Active', count: counts.active, color: 'var(--danger)' },
          { id: 'verified', label: lang === 'id' ? 'Terverifikasi' : 'Verified', count: counts.verified, color: 'var(--info)' },
          { id: 'resolved', label: lang === 'id' ? 'Selesai' : 'Resolved', count: counts.resolved, color: 'var(--ok)' },
          { id: 'archived', label: lang === 'id' ? 'Arsip' : 'Archived', count: counts.archived },
        ].map(s => {
          const active = (s.id === 'all' && statusFilter.size === 0) ||
                         (s.id !== 'all' && statusFilter.size === 1 && statusFilter.has(s.id));
          return (
            <button key={s.id}
              onClick={() => setStatusFilter(s.id === 'all' ? new Set() : new Set([s.id]))}
              style={{
                border: 0, background: 'transparent',
                padding: '10px 14px', fontSize: 13, fontWeight: active ? 600 : 500,
                color: active ? 'var(--fg)' : 'var(--fg-muted)',
                borderBottom: '2px solid ' + (active ? 'var(--primary)' : 'transparent'),
                marginBottom: -1, display: 'inline-flex', alignItems: 'center', gap: 8,
              }}>
              {s.color && <span style={{ width: 6, height: 6, borderRadius: '50%', background: s.color }}></span>}
              {s.label}
              <span style={{
                background: 'var(--bg-subtle)', padding: '1px 7px', borderRadius: 999,
                fontSize: 10.5, fontWeight: 700, color: 'var(--fg-muted)',
              }}>{s.count}</span>
            </button>
          );
        })}
      </div>

      {/* Toolbar */}
      <div style={{ display: 'flex', gap: 10, padding: '14px 24px', alignItems: 'center', borderBottom: '1px solid var(--border)', background: 'var(--bg-elev)', flexWrap: 'wrap' }}>

          <Icon name="search" style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--fg-muted)' }} />

            placeholder={lang === 'id' ? 'Cari ID, judul, atau wilayah…' : 'Search ID, title, or region…'}
            value={search} onChange={e => setSearch(e.target.value)} />
        </div>

        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ fontSize: 11, color: 'var(--fg-muted)', fontWeight: 600, marginRight: 4 }}>{lang === 'id' ? 'Jenis:' : 'Type:'}</span>
          {['banjir', 'karhutla', 'gempa', 'longsor', 'kekeringan'].map(t => (
            <FilterChip key={t} active={typeFilter.has(t)} onClick={() => toggleSet(typeFilter, t, setTypeFilter)}>

        </div>

        {(typeFilter.size + severityFilter.size + (search ? 1 : 0)) > 0 && (
          <button className="btn sm ghost" onClick={() => { setSearch(''); setTypeFilter(new Set()); setSeverityFilter(new Set()); }}>

        <div style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--fg-muted)' }}>
          {lang === 'id' ? `Menampilkan ${sorted.length} dari ${incidents.length}` : `Showing ${sorted.length} of ${incidents.length}`}

      </div>

      {/* Bulk action bar (when selection) */}
      {selected.size > 0 && (
        <div style={{
          background: 'var(--primary-wash)', borderBottom: '1px solid var(--primary)',
          padding: '10px 24px', display: 'flex', alignItems: 'center', gap: 12,
          color: 'var(--primary)', fontSize: 12.5, fontWeight: 600,
        }}>
          <span>{selected.size} {lang === 'id' ? 'dipilih' : 'selected'}</span>
          <div style={{ height: 18, width: 1, background: 'var(--primary)', opacity: 0.3 }}></div>
          <button className="btn sm"><Icon name="check" />{lang === 'id' ? 'Verifikasi' : 'Verify'}</button>
          <button className="btn sm"><Icon name="send" />{lang === 'id' ? 'Tugaskan Tim' : 'Assign Team'}</button>
          <button className="btn sm"><Icon name="paper" />{lang === 'id' ? 'Buat SitRep' : 'Create SitRep'}</button>
          <button className="btn sm ghost" onClick={() => setSelected(new Set())} style={{ marginLeft: 'auto' }}>
            <Icon name="x" size={12} />{lang === 'id' ? 'Batal' : 'Cancel'}
          </button>
        </div>
      )}

      {/* Table */}
      <div className="scroll" style={{ flex: 1, overflow: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13, minWidth: 1100 }}>
          <thead style={{ position: 'sticky', top: 0, zIndex: 2, background: 'var(--bg-elev)', boxShadow: 'inset 0 -1px 0 var(--border)' }}>
            <tr style={{ textAlign: 'left', color: 'var(--fg-muted)', fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.05 }}>
              <th style={{ padding: '10px 12px 10px 24px', width: 40 }}>
                <input type="checkbox" checked={allChecked} ref={el => el && (el.indeterminate = partChecked)} onChange={toggleAll} />
              </th>
              <th style={{ padding: '10px 12px', cursor: 'pointer', userSelect: 'none' }} onClick={() => handleSort('id')}>
                ID {sortArrow('id')}
              </th>
              <th style={{ padding: '10px 12px', cursor: 'pointer', userSelect: 'none' }} onClick={() => handleSort('title')}>
                {lang === 'id' ? 'Insiden' : 'Incident'} {sortArrow('title')}
              </th>
              <th style={{ padding: '10px 12px', cursor: 'pointer', userSelect: 'none' }} onClick={() => handleSort('type')}>
                {lang === 'id' ? 'Jenis' : 'Type'} {sortArrow('type')}
              </th>
              <th style={{ padding: '10px 12px', cursor: 'pointer', userSelect: 'none' }} onClick={() => handleSort('severity')}>
                {lang === 'id' ? 'Keparahan' : 'Severity'} {sortArrow('severity')}
              </th>
              <th style={{ padding: '10px 12px' }}>{lang === 'id' ? 'Status' : 'Status'}</th>
              <th style={{ padding: '10px 12px', textAlign: 'right', cursor: 'pointer', userSelect: 'none' }} onClick={() => handleSort('affected')}>
                {lang === 'id' ? 'Terdampak' : 'Affected'} {sortArrow('affected')}
              </th>
              <th style={{ padding: '10px 12px', cursor: 'pointer', userSelect: 'none' }} onClick={() => handleSort('updated')}>
                {lang === 'id' ? 'Pembaruan' : 'Updated'} {sortArrow('updated')}
              </th>
              <th style={{ padding: '10px 24px 10px 12px', width: 40 }}></th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((inc, idx) => {
              const sel = selected.has(inc.id);
              const color = TYPE_COLOR_MAP[inc.type];
              return (
                <tr key={inc.id}
                  onClick={() => onOpen && onOpen(inc)}
                  style={{
                    borderBottom: '1px solid var(--border)',
                    background: sel ? 'var(--primary-wash)' : 'transparent',
                    cursor: 'pointer',
                  }}
                  onMouseEnter={e => !sel && (e.currentTarget.style.background = 'var(--bg-subtle)')}
                  onMouseLeave={e => !sel && (e.currentTarget.style.background = 'transparent')}
                >
                  <td style={{ padding: '12px 12px 12px 24px' }} onClick={e => e.stopPropagation()}>
                    <input type="checkbox" checked={sel} onChange={() => toggleSet(selected, inc.id, setSelected)} />
                  </td>
                  <td style={{ padding: '12px' }} className="tag-mono">{inc.id}</td>
                  <td style={{ padding: '12px' }}>
                    <div style={{ fontWeight: 600 }}>{lang === 'id' ? inc.title : inc.title_en}</div>
                    <div style={{ fontSize: 11.5, color: 'var(--fg-muted)', marginTop: 2 }}>
                      {inc.region} · {inc.community}
                    </div>
                  </td>
                  <td style={{ padding: '12px' }}>
                    <span className="chip" style={{ background: color, color: 'white', borderColor: 'transparent', fontWeight: 600 }}>
                      {AMAN_DATA.t[lang][inc.type]}
                    </span>
                  </td>
                  <td style={{ padding: '12px' }}>
                    <span className={'chip ' + (inc.severity === 'critical' ? 'danger' : inc.severity === 'high' ? 'warn' : inc.severity === 'medium' ? 'info' : '')}>
                      {AMAN_DATA.t[lang][inc.severity]}
                    </span>
                  </td>
                  <td style={{ padding: '12px' }}>
                    <span className={'chip ' + (STATUS_CHIP[inc.status] || '')}>
                      <span className="dot"></span>{AMAN_DATA.t[lang][inc.status] || inc.status}
                    </span>
                  </td>
                  <td style={{ padding: '12px', textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>
                    <div style={{ fontWeight: 600 }}>{inc.affected.toLocaleString('id-ID')}</div>
                    <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>{inc.households} KK</div>
                  </td>
                  <td style={{ padding: '12px', color: 'var(--fg-muted)', fontSize: 12 }}>
                    {timeAgo(inc.updated)}
                  </td>
                  <td style={{ padding: '12px 24px 12px 12px' }} onClick={e => e.stopPropagation()}>
                    <button className="btn sm ghost" style={{ width: 28, padding: 0, justifyContent: 'center' }}>
                      <Icon name="chev" size={14} />
                    </button>
                  </td>
                </tr>
              );
            })}
            {sorted.length === 0 && (
              <tr>
                <td colSpan={9}>
                  <div className="empty">
                    {lang === 'id' ? 'Tidak ada insiden cocok dengan filter.' : 'No incidents match the current filters.'}
                  </div>
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>

      {/* Footer pagination */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '10px 24px', borderTop: '1px solid var(--border)', background: 'var(--bg-elev)',
        fontSize: 12, color: 'var(--fg-muted)', flexShrink: 0,

          <button className="btn sm" disabled style={{ width: 28, padding: 0, justifyContent: 'center' }}><Icon name="chev" size={12} /></button>
        </div>
      </div>
    </>
  );
};

                </div>
              </>
            )}
          </div>
        </div>
      )}

      {detail && <CampaignDetail lang={lang} campaign={detail} onClose={() => setDetail(null)} />}
    </>
  );
};

const CATEGORIES = {
  id: { 'Sengketa Lahan': 'Sengketa Lahan', 'Distribusi Bantuan': 'Distribusi Bantuan', 'Lingkungan': 'Lingkungan', 'Logistik Relawan': 'Logistik Relawan', 'Akses': 'Akses', 'Data & Pelaporan': 'Data & Pelaporan', 'Medis': 'Medis' },
  en: { 'Sengketa Lahan': 'Land Dispute', 'Distribusi Bantuan': 'Aid Distribution', 'Lingkungan': 'Environment', 'Logistik Relawan': 'Volunteer Logistics', 'Akses': 'Access', 'Data & Pelaporan': 'Data & Reports', 'Medis': 'Medical' },
};

const STATUS_META = {
  open: { id: 'Buka', en: 'Open', color: '#c94c2e', bg: 'var(--danger-bg)' },
  investigation: { id: 'Investigasi', en: 'Investigation', color: '#d99a30', bg: 'var(--warn-bg)' },
  resolved: { id: 'Selesai', en: 'Resolved', color: '#5e8a2a', bg: 'var(--ok-bg)' },
};

const PRIORITY_META = {
  high: { id: 'Tinggi', en: 'High', color: 'var(--danger)' },
  medium: { id: 'Sedang', en: 'Medium', color: 'var(--warn)' },
  low: { id: 'Rendah', en: 'Low', color: 'var(--fg-muted)' },
};

const ComplaintsModule = ({ lang }) => {
  const [selectedId, setSelectedId] = React.useState(COMPLAINTS[0].id);
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const [responseText, setResponseText] = React.useState('');
  const [responseToast, setResponseToast] = React.useState(false);

  const filtered = COMPLAINTS.filter(c => {
    if (statusFilter !== 'all' && c.status !== statusFilter) return false;
    if (search && !`${c.subject} ${c.id} ${c.community}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const selected = COMPLAINTS.find(c => c.id === selectedId) || filtered[0];

  const counts = {
    open: COMPLAINTS.filter(c => c.status === 'open').length,
    investigation: COMPLAINTS.filter(c => c.status === 'investigation').length,
    resolved: COMPLAINTS.filter(c => c.status === 'resolved').length,
  };

  const handleRespond = () => {
    if (!responseText.trim()) return;
    setResponseText('');
    setResponseToast(true);
    setTimeout(() => setResponseToast(false), 2400);
  };

  return (
    <>
      <div className="page-head">
        <div>
          <div className="crumbs">
            {lang === 'id' ? 'Operasional' : 'Operational'} <span style={{margin: '0 6px'}}>/</span> {lang === 'id' ? 'Pengaduan' : 'Complaints'}
          </div>
          <h1>{lang === 'id' ? 'Pengaduan Komunitas' : 'Community Complaints'}</h1>
          <div className="sub-label">
            {lang === 'id'
              ? `${COMPLAINTS.length} tiket · ${counts.open + counts.investigation} terbuka · SLA respons 24 jam`
              : `${COMPLAINTS.length} tickets · ${counts.open + counts.investigation} open · 24hr response SLA`}
          </div>
        </div>
        <div className="actions">
          <button className="btn"><Icon name="download" />{lang === 'id' ? 'Laporan' : 'Report'}</button>
          <button className="btn primary"><Icon name="plus" />{lang === 'id' ? 'Buat Tiket' : 'New Ticket'}</button>
        </div>
      </div>

      {/* Status overview cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, padding: '16px 16px 0' }}>
        {[
          { id: 'open', label: lang === 'id' ? 'Buka — Antrean' : 'Open — Queue', sub: lang === 'id' ? 'menunggu penugasan' : 'awaiting assignment' },
          { id: 'investigation', label: lang === 'id' ? 'Investigasi' : 'Investigation', sub: lang === 'id' ? 'sedang ditindaklanjuti' : 'being addressed' },
          { id: 'resolved', label: lang === 'id' ? 'Selesai' : 'Resolved', sub: lang === 'id' ? 'tiket ditutup' : 'tickets closed' },
        ].map(s => {
          const meta = STATUS_META[s.id];
          const active = statusFilter === s.id;
          return (
            <button key={s.id} onClick={() => setStatusFilter(active ? 'all' : s.id)}
              className="card" style={{
                padding: '14px 16px', border: '1px solid ' + (active ? meta.color : 'var(--border)'),
                background: active ? meta.bg : 'var(--bg-elev)',
                textAlign: 'left', cursor: 'pointer',
              }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: meta.color }}></span>
                <span style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.06, color: 'var(--fg-muted)' }}>{s.label}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>
                <span style={{ fontSize: 28, fontWeight: 700, color: meta.color, fontVariantNumeric: 'tabular-nums' }}>{counts[s.id]}</span>
                <span style={{ fontSize: 11.5, color: 'var(--fg-muted)' }}>{s.sub}</span>
              </div>
            </button>
          );
        })}
      </div>

      {/* List + Detail split */}
      <div style={{ display: 'grid', gridTemplateColumns: 'minmax(340px, 420px) 1fr', gap: 12, padding: 16, flex: 1, minHeight: 0 }}>
        {/* LEFT: list */}
        <div className="card" style={{ display: 'flex', flexDirection: 'column', minHeight: 0 }}>
          <div style={{ padding: '12px 14px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ position: 'relative' }}>
              <Icon name="search" size={14} style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--fg-muted)' }} />
              <input className="input" style={{ paddingLeft: 32 }}
                placeholder={lang === 'id' ? 'Cari tiket…' : 'Search tickets…'}
                value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            {statusFilter !== 'all' && (
              <div style={{ marginTop: 8, fontSize: 11, color: 'var(--fg-muted)' }}>
                {lang === 'id' ? 'Filter:' : 'Filter:'} <span className="chip primary" style={{ marginLeft: 4 }}>{STATUS_META[statusFilter][lang]}</span>
                <button onClick={() => setStatusFilter('all')} style={{ border: 0, background: 'none', color: 'var(--primary)', marginLeft: 6, fontSize: 11, cursor: 'pointer' }}>× clear</button>
              </div>
            )}
          </div>
          <div className="scroll" style={{ flex: 1, overflowY: 'auto' }}>
            {filtered.map(c => {
              const sel = c.id === selectedId;
              const stat = STATUS_META[c.status];
              const prio = PRIORITY_META[c.priority];
              return (
                <button key={c.id} onClick={() => setSelectedId(c.id)}
                  style={{
                    width: '100%', textAlign: 'left', border: 0,
                    background: sel ? 'var(--primary-wash)' : 'transparent',
                    padding: '14px 16px', borderBottom: '1px solid var(--border)',
                    display: 'block',
                  }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 5 }}>
                    <span style={{ width: 4, height: 16, background: prio.color, borderRadius: 2, flexShrink: 0 }}></span>
                    <span className="tag-mono" style={{ fontSize: 10 }}>{c.id}</span>
                    <span className="chip" style={{
                      background: stat.bg, color: stat.color, borderColor: 'transparent',
                      fontSize: 9, padding: '1px 6px', marginLeft: 'auto',
                    }}>{stat[lang]}</span>
                  </div>
                  <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.35, marginBottom: 5 }}>
                    {lang === 'id' ? c.subject : c.subject_en}
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 11, color: 'var(--fg-muted)' }}>
                    <span>{c.community || '—'}</span>
                    <span>·</span>
                    <span>{timeAgo(c.created)}</span>
                    <span style={{ marginLeft: 'auto', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                      <Icon name="msg" size={10} />{c.responses}
                    </span>
                  </div>
                </button>
              );
            })}
            {filtered.length === 0 && <div className="empty">{lang === 'id' ? 'Tidak ada tiket.' : 'No tickets.'}</div>}
          </div>
        </div>

        {/* RIGHT: detail */}
        {selected && (
          <div className="card" style={{ display: 'flex', flexDirection: 'column', minHeight: 0, minWidth: 0 }}>
            <div style={{ padding: '18px 24px', borderBottom: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                <span className="tag-mono" style={{ fontSize: 11 }}>{selected.id}</span>
                <span className="chip" style={{ background: STATUS_META[selected.status].bg, color: STATUS_META[selected.status].color, borderColor: 'transparent' }}>
                  <span className="dot"></span>{STATUS_META[selected.status][lang]}
                </span>
                <span className="chip" style={{ borderColor: PRIORITY_META[selected.priority].color, color: PRIORITY_META[selected.priority].color }}>
                  {lang === 'id' ? 'Prioritas' : 'Priority'}: {PRIORITY_META[selected.priority][lang]}
                </span>
                <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--fg-muted)' }}>
                  {lang === 'id' ? 'Dibuat' : 'Created'} {timeAgo(selected.created)}
                </span>
              </div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, letterSpacing: '-0.01em' }}>
                {lang === 'id' ? selected.subject : selected.subject_en}
              </h2>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 16, marginTop: 12, fontSize: 12, color: 'var(--fg-muted)' }}>
                <div><strong style={{ color: 'var(--fg)' }}>{lang === 'id' ? 'Kategori' : 'Category'}:</strong> {CATEGORIES[lang][selected.category] || selected.category}</div>
                <div><strong style={{ color: 'var(--fg)' }}>{lang === 'id' ? 'Pelapor' : 'Reporter'}:</strong> {selected.reporter}</div>
                <div><strong style={{ color: 'var(--fg)' }}>{lang === 'id' ? 'Wilayah' : 'Region'}:</strong> {selected.region}</div>
                {selected.assignee && <div><strong style={{ color: 'var(--fg)' }}>{lang === 'id' ? 'Ditugaskan' : 'Assigned'}:</strong> {selected.assignee}</div>}
              </div>
            </div>

            <div className="scroll" style={{ flex: 1, overflowY: 'auto', padding: 24 }}>
              {/* Workflow steps */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 24 }}>
                {['open', 'investigation', 'resolved'].map((step, i) => {
                  const stepOrder = { open: 0, investigation: 1, resolved: 2 };
                  const cur = stepOrder[selected.status];
                  const done = i < cur;
                  const active = i === cur;
                  const stepMeta = STATUS_META[step];
                  return (
                    <React.Fragment key={step}>
                      <div style={{
                        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
                        opacity: (done || active) ? 1 : 0.4,
                      }}>
                        <div style={{
                          width: 30, height: 30, borderRadius: '50%',
                          background: done || active ? stepMeta.color : 'var(--bg-subtle)',
                          color: 'white', display: 'grid', placeItems: 'center',
                          fontSize: 13, fontWeight: 800,
                          boxShadow: active ? `0 0 0 4px ${stepMeta.bg}` : 'none',
                        }}>{done ? '✓' : i + 1}</div>
                        <div style={{ fontSize: 11.5, fontWeight: active ? 700 : 500, color: active ? stepMeta.color : 'var(--fg-muted)' }}>
                          {stepMeta[lang]}
                        </div>
                      </div>
                      {i < 2 && <div style={{ flex: 1, height: 2, background: done ? STATUS_META[step].color : 'var(--border)', marginTop: -16, opacity: 0.5 }}></div>}
                    </React.Fragment>
                  );
                })}
              </div>

              {/* Description */}
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: 0.06, marginBottom: 8 }}>
                  {lang === 'id' ? 'Detail Pengaduan' : 'Complaint Detail'}
                </div>
                <div style={{
                  padding: 16, background: 'var(--bg-subtle)', borderRadius: 10,
                  fontSize: 13.5, lineHeight: 1.6,
                }}>{selected.desc}</div>
              </div>

              {/* Resolution if resolved */}
              {selected.resolution && (
                <div style={{ marginBottom: 24, padding: 16, background: 'var(--ok-bg)', color: 'var(--ok)', borderRadius: 10, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                  <Icon name="check" size={20} style={{ flexShrink: 0, marginTop: 1 }} />
                  <div>
                    <div style={{ fontWeight: 700, marginBottom: 4 }}>{lang === 'id' ? 'Resolusi' : 'Resolution'}</div>
                    <div style={{ fontSize: 13, lineHeight: 1.55, color: 'var(--fg)' }}>{selected.resolution}</div>
                  </div>
                </div>
              )}

              {/* Conversation thread */}
              <div>
                <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: 0.06, marginBottom: 12 }}>
                  {lang === 'id' ? 'Riwayat Tanggapan' : 'Response Thread'} ({selected.responses})
                </div>
                {selected.responses > 0 ? (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    {/* mock thread */}
                    {[
                      { from: selected.assignee || 'Operator Pusat', role: 'op', time: '5 jam lalu', text: 'Tim mediasi sudah dikirim ke lokasi. Pertemuan dengan perwakilan komunitas dijadwalkan besok pagi.' },
                      { from: selected.reporter, role: 'reporter', time: '8 jam lalu', text: 'Terima kasih responnya. Saat ini kondisi masih tegang. Mohon segera ditindaklanjuti.' },
                      { from: selected.assignee || 'Tim AMAN', role: 'op', time: '1 hari lalu', text: 'Pengaduan diterima dan diteruskan ke tim mediasi. Investigasi awal dimulai hari ini.' },
                    ].slice(0, Math.min(3, selected.responses)).map((m, i) => (
                      <div key={i} style={{
                        display: 'grid', gridTemplateColumns: '32px 1fr', gap: 12,
                        padding: 12, background: m.role === 'op' ? 'var(--primary-wash)' : 'var(--bg-subtle)',
                        borderRadius: 10,
                      }}>
                        <div style={{
                          width: 32, height: 32, borderRadius: '50%',
                          background: m.role === 'op' ? 'var(--primary)' : 'var(--fg-muted)',
                          color: 'white', display: 'grid', placeItems: 'center', fontWeight: 700, fontSize: 11,
                        }}>{m.from.split(' ').map(w => w[0]).slice(0, 2).join('')}</div>
                        <div>
                          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 4 }}>
                            <span style={{ fontSize: 12.5, fontWeight: 600 }}>{m.from}</span>
                            <span style={{ fontSize: 10.5, color: 'var(--fg-muted)' }}>· {m.time}</span>
                          </div>
                          <div style={{ fontSize: 13, lineHeight: 1.55 }}>{m.text}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={{ padding: 20, textAlign: 'center', color: 'var(--fg-muted)', fontSize: 12.5, background: 'var(--bg-subtle)', borderRadius: 10 }}>
                    {lang === 'id' ? 'Belum ada tanggapan. Tindak lanjuti sekarang untuk memenuhi SLA 24 jam.' : 'No responses yet. Address now to meet 24hr SLA.'}
                  </div>
                )}
              </div>
            </div>

            {/* Response composer */}
            {selected.status !== 'resolved' && (
              <div style={{ padding: 16, borderTop: '1px solid var(--border)', background: 'var(--bg-subtle)' }}>
                <textarea className="input" style={{ background: 'var(--bg-elev)' }}
                  placeholder={lang === 'id' ? 'Tulis tanggapan untuk pengadu…' : 'Write response to reporter…'}
                  rows={3} value={responseText} onChange={e => setResponseText(e.target.value)} />
                <div style={{ display: 'flex', gap: 8, marginTop: 8, alignItems: 'center' }}>
                  <button className="btn sm ghost"><Icon name="photo" size={12} />{lang === 'id' ? 'Lampiran' : 'Attach'}</button>
                  <select className="select" style={{ width: 'auto', height: 28, fontSize: 11 }}>
                    <option>{lang === 'id' ? 'Tetap di Investigasi' : 'Keep Investigating'}</option>
                    <option>{lang === 'id' ? 'Tandai Selesai' : 'Mark Resolved'}</option>
                    <option>{lang === 'id' ? 'Eskalasi' : 'Escalate'}</option>
                  </select>
                  <button className="btn primary" style={{ marginLeft: 'auto' }} onClick={handleRespond} disabled={!responseText.trim()}>
                    <Icon name="send" />{lang === 'id' ? 'Kirim Tanggapan' : 'Send Response'}
                  </button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {responseToast && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: 'var(--green-900)', color: 'white', padding: '10px 18px', borderRadius: 10,
          fontSize: 13, display: 'flex', gap: 8, alignItems: 'center', zIndex: 9999,
          boxShadow: '0 10px 30px rgba(0,0,0,0.2)',
        }}>
          <Icon name="check" />{lang === 'id' ? 'Tanggapan terkirim ke pengadu' : 'Response sent to reporter'}
        </div>
      )}
    </>
  );
};

window.ComplaintsModule = ComplaintsModule;

// ── tiny SVG chart primitives ────────────────────────────────────────────────

function AreaChart({ data, height = 140, colors = ['var(--primary)'], stacked = true, showAxis = true }) {
  // data: [{ label, values: [n1, n2, ...] }]
  const W = 600;
  const H = height;
  const pad = { l: 28, r: 12, t: 12, b: showAxis ? 22 : 4 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const n = data.length;
  const seriesCount = data[0]?.values.length || 1;
  const stacks = data.map(d => stacked ? d.values.reduce((a, b) => a + b, 0) : Math.max(...d.values));
  const max = Math.ceil(Math.max(...stacks, 1) * 1.1 / 5) * 5;
  const x = i => pad.l + (innerW * i) / Math.max(1, n - 1);
  const y = v => pad.t + innerH - (v / max) * innerH;
  const paths = [];
  for (let s = 0; s < seriesCount; s++) {
    const points = data.map((d, i) => {
      const upTo = stacked ? d.values.slice(0, s + 1).reduce((a, b) => a + b, 0) : d.values[s];
      return [x(i), y(upTo)];
    });
    const basePoints = data.map((d, i) => {
      const upTo = stacked ? d.values.slice(0, s).reduce((a, b) => a + b, 0) : 0;
      return [x(i), y(upTo)];
    });
    const top = points.map(([px, py], i) => `${i ? 'L' : 'M'}${px},${py}`).join(' ');
    const bot = basePoints.slice().reverse().map(([px, py]) => `L${px},${py}`).join(' ');
    paths.push({ d: top + ' ' + bot + ' Z', line: top, color: colors[s % colors.length] });
  }
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: H, display: 'block' }}>
      {[0, 0.25, 0.5, 0.75, 1].map(t => (
        <line key={t} x1={pad.l} x2={W - pad.r} y1={pad.t + innerH * t} y2={pad.t + innerH * t}
              stroke="var(--border)" strokeWidth="1" strokeDasharray={t === 1 ? '0' : '2 3'} />
      ))}
      {showAxis && [0, 0.5, 1].map(t => (
        <text key={t} x={pad.l - 6} y={pad.t + innerH * (1 - t) + 4}
              fontSize="9" fill="var(--fg-muted)" textAnchor="end" fontFamily="var(--font-mono)">
          {Math.round(max * t)}
        </text>
      ))}
      {paths.map((p, i) => (
        <g key={i}>
          <path d={p.d} fill={p.color} opacity="0.15" />
          <path d={p.line} fill="none" stroke={p.color} strokeWidth="2" />
        </g>
      ))}
      {showAxis && data.map((d, i) => i % Math.ceil(n / 8) === 0 && (
        <text key={i} x={x(i)} y={H - 6}
              fontSize="9" fill="var(--fg-muted)" textAnchor="middle">
          {d.label}
        </text>
      ))}
    </svg>
  );
}

function BarChart({ data, height = 140, color = 'var(--primary)' }) {
  // data: [{ label, value }]
  const W = 600, H = height;
  const pad = { l: 28, r: 12, t: 12, b: 22 };
  const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;
  const max = Math.ceil(Math.max(...data.map(d => d.value)) * 1.15);
  const barW = innerW / data.length * 0.62;
  const slot = innerW / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: H, display: 'block' }}>
      {[0, 0.5, 1].map(t => (
        <line key={t} x1={pad.l} x2={W - pad.r} y1={pad.t + innerH * t} y2={pad.t + innerH * t}
              stroke="var(--border)" strokeWidth="1" strokeDasharray={t === 1 ? '0' : '2 3'} />
      ))}
      {[0, 0.5, 1].map(t => (
        <text key={t} x={pad.l - 6} y={pad.t + innerH * (1 - t) + 4}
              fontSize="9" fill="var(--fg-muted)" textAnchor="end" fontFamily="var(--font-mono)">
          {Math.round(max * t)}
        </text>
      ))}
      {data.map((d, i) => {
        const h = (d.value / max) * innerH;
        const cx = pad.l + slot * (i + 0.5);
        return (
          <g key={i}>
            <rect x={cx - barW / 2} y={pad.t + innerH - h} width={barW} height={h}
                  fill={d.color || color} rx="3" />
            <text x={cx} y={H - 6} fontSize="9" fill="var(--fg-muted)" textAnchor="middle">
              {d.label}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function DonutChart({ data, size = 160, thickness = 22, centerLabel, centerSub }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  const r = size / 2 - thickness / 2 - 2;
  const cx = size / 2, cy = size / 2;
  let acc = 0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width: size, height: size, flexShrink: 0 }}>
      {data.map((d, i) => {
        const start = (acc / total) * Math.PI * 2 - Math.PI / 2;
        acc += d.value;
        const end = (acc / total) * Math.PI * 2 - Math.PI / 2;
        const large = end - start > Math.PI ? 1 : 0;
        const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
        const x2 = cx + r * Math.cos(end), y2 = cy + r * Math.sin(end);
        return (
          <path key={i} d={`M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}`}
                fill="none" stroke={d.color} strokeWidth={thickness} strokeLinecap="butt" />
        );
      })}
      {centerLabel && (
        <text x={cx} y={cy - 2} fontSize="22" fontWeight="700" textAnchor="middle" fill="var(--fg)" letterSpacing="-0.02em">
          {centerLabel}
        </text>
      )}
      {centerSub && (
        <text x={cx} y={cy + 14} fontSize="10" fill="var(--fg-muted)" textAnchor="middle">
          {centerSub}
        </text>
      )}
    </svg>
  );
}

// Funnel-ish horizontal bars showing response stages
function FunnelChart({ stages, color = 'var(--primary)' }) {
  const max = Math.max(...stages.map(s => s.value));
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {stages.map((s, i) => {
        const pct = s.value / max * 100;
        return (
          <div key={i}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11.5, marginBottom: 3 }}>
              <span style={{ fontWeight: 500 }}>{s.label}</span>
              <span className="tag-mono">{s.value.toLocaleString('id-ID')}{s.unit ? ` ${s.unit}` : ''}</span>
            </div>
            <div style={{ height: 8, background: 'var(--bg-subtle)', borderRadius: 999, position: 'relative' }}>
              <div style={{ width: pct + '%', height: '100%', background: s.color || color, borderRadius: 999 }}></div>
            </div>
          </div>
        );
      })}
    </div>
