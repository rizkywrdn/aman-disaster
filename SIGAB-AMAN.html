  <style>
/* AMAN Platform — design tokens + shell styles
   Aesthetic: nature + tech. Deep green primary, generous whitespace, neutral grays.
   shadcn-ish: subtle borders, soft shadows, modest radii. */

:root {
  /* greens (deep / mid / leaf / wash) */
  --green-900: oklch(0.30 0.06 155);
  --green-700: oklch(0.42 0.09 152);
  --green-600: oklch(0.50 0.10 150);
  --green-500: oklch(0.58 0.11 148);
  --green-100: oklch(0.94 0.04 150);
  --green-50:  oklch(0.97 0.02 150);

  /* neutrals */
  --bg:        oklch(0.995 0.002 100);
  --bg-subtle: oklch(0.97 0.003 110);
  --bg-elev:   #ffffff;
  --border:    oklch(0.91 0.005 110);
  --border-strong: oklch(0.83 0.008 110);
  --fg:        oklch(0.22 0.01 150);
  --fg-muted:  oklch(0.48 0.01 150);
  --fg-subtle: oklch(0.62 0.008 150);

  /* status */
  --warn:    oklch(0.72 0.16 70);
  --warn-bg: oklch(0.96 0.04 80);
  --danger:    oklch(0.58 0.18 27);
  --danger-bg: oklch(0.96 0.04 27);
  --info:    oklch(0.55 0.13 240);
  --info-bg: oklch(0.96 0.03 240);
  --ok:      oklch(0.55 0.13 150);
  --ok-bg:   oklch(0.95 0.04 150);

  /* primary (mapped from --accent-hue) */
  --accent-hue: 150;
  --accent-chroma: 0.09;
  --primary:    oklch(0.42 var(--accent-chroma) var(--accent-hue));
  --primary-hover: oklch(0.36 var(--accent-chroma) var(--accent-hue));
  --primary-fg: #ffffff;
  --primary-wash: oklch(0.94 0.03 var(--accent-hue));

  /* density */
  --row-h: 40px;
  --pad-1: 8px;
  --pad-2: 12px;
  --pad-3: 16px;
  --pad-4: 24px;
  --pad-5: 32px;

  /* radii */
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;

  /* type */
  --font-sans: "Manrope", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

[data-density="compact"] {
  --row-h: 32px;
  --pad-1: 6px;
  --pad-2: 8px;
  --pad-3: 12px;
  --pad-4: 16px;
  --pad-5: 20px;
}
[data-density="comfortable"] {
  --row-h: 48px;
  --pad-1: 10px;
  --pad-2: 14px;
  --pad-3: 20px;
  --pad-4: 28px;
  --pad-5: 40px;
}

[data-theme="dark"] {
  --bg:        oklch(0.18 0.01 150);
  --bg-subtle: oklch(0.22 0.01 150);
  --bg-elev:   oklch(0.24 0.012 150);
  --border:    oklch(0.30 0.012 150);
  --border-strong: oklch(0.38 0.012 150);
  --fg:        oklch(0.95 0.005 150);
  --fg-muted:  oklch(0.72 0.008 150);
  --fg-subtle: oklch(0.58 0.008 150);
  --green-100: oklch(0.32 0.05 150);
  --green-50:  oklch(0.26 0.04 150);
  --primary:    oklch(0.62 var(--accent-chroma) var(--accent-hue));
  --primary-hover: oklch(0.70 var(--accent-chroma) var(--accent-hue));
  --primary-wash: oklch(0.30 0.05 var(--accent-hue));
  --warn-bg: oklch(0.32 0.05 80);
  --danger-bg: oklch(0.32 0.06 27);
  --info-bg: oklch(0.30 0.05 240);
  --ok-bg: oklch(0.30 0.05 150);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--fg);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#root { height: 100vh; display: flex; flex-direction: column; }

button { font: inherit; color: inherit; cursor: pointer; }

/* ── App shell ───────────────────────────────────────────── */

.app-shell { display: flex; flex: 1; min-height: 0; }

.header {
  display: flex;
  align-items: center;
  height: 56px;
  padding: 0 var(--pad-3);
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  gap: var(--pad-3);
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--primary);
  color: var(--primary-fg);
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: -0.04em;
}
.brand-mark svg { width: 18px; height: 18px; }
.brand-text { line-height: 1.05; }
.brand-text .l1 { font-size: 14px; font-weight: 700; }
.brand-text .l2 { font-size: 11px; color: var(--fg-muted); font-weight: 500; letter-spacing: 0.02em; }

.header-search {
  flex: 1; max-width: 480px;
  position: relative;
}
.header-search input {
  width: 100%;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0 12px 0 36px;
  background: var(--bg-subtle);
  color: var(--fg);
  font: inherit;
  outline: none;
}
.header-search input:focus { border-color: var(--primary); background: var(--bg-elev); }
.header-search .kbd {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font: 500 11px var(--font-mono);
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--fg-muted);
  background: var(--bg-elev);
}
.header-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--fg-muted); }

.header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.icon-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  border-radius: var(--r-md);
  display: grid; place-items: center;
  color: var(--fg-muted);
  position: relative;
}
.icon-btn:hover { color: var(--fg); border-color: var(--border-strong); }
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn .dot {
  position: absolute; top: 6px; right: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--danger);
  box-shadow: 0 0 0 2px var(--bg-elev);
}

.lang-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  height: 36px;
  font-size: 12px;
  font-weight: 600;
}
.lang-toggle button {
  border: 0; background: var(--bg-elev); color: var(--fg-muted);
  padding: 0 10px;
}
.lang-toggle button[data-on="1"] { background: var(--primary); color: var(--primary-fg); }

.user-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px 0 4px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--bg-elev);
}
.user-pill .avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--primary-wash); color: var(--primary);
  display: grid; place-items: center;
  font-weight: 700; font-size: 11px;
}
.user-pill .meta { line-height: 1.05; font-size: 12px; }
.user-pill .meta .n { font-weight: 600; }
.user-pill .meta .r { color: var(--fg-muted); font-size: 10.5px; }

/* sidebar */
.sidebar {
  width: 248px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg-elev);
  display: flex;
  flex-direction: column;
  transition: width .18s ease;
  overflow: hidden;
}
.sidebar.collapsed { width: 60px; }
.sidebar-scroll { flex: 1; overflow-y: auto; padding: var(--pad-3) 10px; }
.sb-group { margin-bottom: 18px; }
.sb-group-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-subtle);
  padding: 0 8px 6px;
}
.sidebar.collapsed .sb-group-label { opacity: 0; height: 8px; }
.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 10px;
  height: 36px;
  border-radius: var(--r-md);
  border: 0;
  background: transparent;
  color: var(--fg-muted);
  font-size: 13px;
  width: 100%;
  text-align: left;
  font-weight: 500;
  position: relative;
}
.sb-item:hover { background: var(--bg-subtle); color: var(--fg); }
.sb-item.active { background: var(--primary-wash); color: var(--primary); font-weight: 600; }
[data-theme="dark"] .sb-item.active { color: var(--primary); }
.sb-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.sb-item .lbl { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-item .badge {
  font-size: 10.5px; font-weight: 700;
  padding: 1px 6px; border-radius: 999px;
  background: var(--warn-bg); color: var(--warn);
}
.sb-item .badge.danger { background: var(--danger-bg); color: var(--danger); }
.sb-item .badge.ok { background: var(--ok-bg); color: var(--ok); }
.sidebar.collapsed .sb-item .lbl,
.sidebar.collapsed .sb-item .badge { display: none; }
.sidebar.collapsed .sb-item { justify-content: center; padding: 0; }

.sidebar-foot {
  border-top: 1px solid var(--border);
  padding: 10px;
}
.sidebar-foot .org {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--r-md);
  background: var(--bg-subtle);
  font-size: 12px;
}
.sidebar.collapsed .sidebar-foot .org .text { display: none; }
.sidebar-foot .org .logo {
  width: 28px; height: 28px; border-radius: 6px; background: var(--green-100); color: var(--green-700);
  display: grid; place-items: center; font-weight: 800; font-size: 10px; flex-shrink: 0;
}
.sidebar-foot .org .text .a { font-weight: 600; }
.sidebar-foot .org .text .b { color: var(--fg-muted); font-size: 10.5px; }

.main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

/* ── Common bits ─────────────────────────────────────────── */

.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: var(--pad-3);
  padding: var(--pad-4) var(--pad-4) var(--pad-3);
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
}
.page-head .crumbs {
  font-size: 12px;
  color: var(--fg-muted);
  margin-bottom: 6px;
}
.page-head h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.015em;
}
.page-head .sub-label {
  font-size: 12px;
  color: var(--fg-muted);
  margin-top: 4px;
}
.page-head .actions { display: flex; gap: 8px; align-items: center; }

.btn {
  height: 36px;
  padding: 0 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--fg);
  font-weight: 500;
  font-size: 13px;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn:hover { border-color: var(--border-strong); }
.btn svg { width: 14px; height: 14px; }
.btn.primary { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
.btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn.danger { background: var(--danger); color: white; border-color: var(--danger); }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--bg-subtle); }
.btn.sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn.icon { width: 36px; padding: 0; justify-content: center; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--pad-2) var(--pad-3);
  border-bottom: 1px solid var(--border);
}
.card-head h3 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
.card-head .sub { font-size: 11px; color: var(--fg-muted); }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg-subtle);
  color: var(--fg-muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.chip.danger { background: var(--danger-bg); color: var(--danger); border-color: transparent; }
.chip.warn { background: var(--warn-bg); color: var(--warn); border-color: transparent; }
.chip.ok { background: var(--ok-bg); color: var(--ok); border-color: transparent; }
.chip.info { background: var(--info-bg); color: var(--info); border-color: transparent; }
.chip.primary { background: var(--primary-wash); color: var(--primary); border-color: transparent; }
.chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.kv { display: grid; grid-template-columns: max-content 1fr; gap: 6px 16px; font-size: 12.5px; }
.kv dt { color: var(--fg-muted); }
.kv dd { margin: 0; font-weight: 500; }

.tag-mono {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: -0.01em;
}

/* Scrollbar */
.scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.scroll::-webkit-scrollbar-track { background: transparent; }
.scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; border: 2px solid var(--bg); background-clip: content-box; }
.scroll { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }

/* Map */
.leaflet-container { background: var(--bg-subtle) !important; font-family: var(--font-sans) !important; }
[data-theme="dark"] .leaflet-tile { filter: hue-rotate(180deg) invert(0.92) brightness(0.95); }
.aman-marker {
  width: 28px; height: 28px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  border: 2px solid white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  display: grid; place-items: center;
}
.aman-marker > div { transform: rotate(45deg); color: white; font-size: 13px; line-height: 1; }
.pulse-marker {
  width: 16px; height: 16px;
  border-radius: 50%;
  position: relative;
}
.pulse-marker::before {
  content: ''; position: absolute; inset: -6px;
  border-radius: 50%;
  background: inherit;
  opacity: 0.3;
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0% { transform: scale(0.6); opacity: 0.6; }
  100% { transform: scale(1.8); opacity: 0; }
}

/* form controls */
.input {
  width: 100%;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0 12px;
  background: var(--bg-elev);
  color: var(--fg);
  font: inherit;
  outline: none;
}
.input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-wash); }
textarea.input { height: auto; padding: 10px 12px; resize: vertical; min-height: 80px; line-height: 1.5; }
.select {
  width: 100%;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0 32px 0 12px;
  background: var(--bg-elev) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23737373' d='M0 0h10L5 6z'/></svg>") no-repeat right 10px center;
  color: var(--fg);
  font: inherit;
  outline: none;
  appearance: none;
}
.label { display: block; font-size: 12px; font-weight: 600; color: var(--fg); margin-bottom: 6px; }
.label .hint { font-weight: 400; color: var(--fg-muted); margin-left: 6px; }

/* tabs */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); padding: 0 var(--pad-4); }
.tabs button {
  border: 0; background: transparent;
  padding: 10px 14px;
  font-size: 13px; font-weight: 500;
  color: var(--fg-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tabs button:hover { color: var(--fg); }
.tabs button.active { color: var(--fg); border-bottom-color: var(--primary); font-weight: 600; }

/* progress */
.bar { height: 6px; background: var(--bg-subtle); border-radius: 999px; overflow: hidden; }
.bar > div { height: 100%; background: var(--primary); border-radius: 999px; }
.bar.warn > div { background: var(--warn); }
.bar.danger > div { background: var(--danger); }
.bar.ok > div { background: var(--ok); }

/* en label */
.bi { display: inline-flex; flex-direction: column; line-height: 1.1; }
.bi-en { font-size: 0.78em; color: var(--fg-muted); font-weight: 400; letter-spacing: 0.005em; }

/* leaflet popup override */
.leaflet-popup-content-wrapper {
  background: var(--bg-elev) !important;
  color: var(--fg) !important;
  border-radius: var(--r-md) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15) !important;
}
.leaflet-popup-tip { background: var(--bg-elev) !important; }
.leaflet-popup-content { margin: 10px 12px !important; font-family: var(--font-sans) !important; }
.leaflet-control-zoom a {
  background: var(--bg-elev) !important;
  color: var(--fg) !important;
  border-color: var(--border) !important;
}
.leaflet-control-attribution {
  background: rgba(255,255,255,0.75) !important;
  font-size: 10px !important;
}
[data-theme="dark"] .leaflet-control-attribution { background: rgba(0,0,0,0.6) !important; color: var(--fg-muted) !important; }
[data-theme="dark"] .leaflet-control-attribution a { color: var(--fg) !important; }

/* status colors for markers */
.marker-banjir { background: oklch(0.55 0.13 240); }
.marker-karhutla { background: oklch(0.58 0.18 27); }
.marker-gempa { background: oklch(0.45 0.06 280); }
.marker-longsor { background: oklch(0.55 0.11 50); }
.marker-kekeringan { background: oklch(0.62 0.10 80); }

/* empty state */
.empty {
  display: grid; place-items: center;
  padding: 40px 20px;
  color: var(--fg-muted);
  text-align: center;
  font-size: 13px;
}

/* skeleton */
.skel { background: linear-gradient(90deg, var(--bg-subtle), var(--border), var(--bg-subtle)); background-size: 200% 100%; animation: skel 1.6s linear infinite; border-radius: 4px; }
@keyframes skel { from { background-position: 0% 0; } to { background-position: -200% 0; } }

  </style>
</head>

// helper: format IDR
window.formatIDR = (n) => {
  if (n >= 1e9) return 'Rp ' + (n / 1e9).toFixed(2).replace(/\.?0+$/, '') + ' M';
  if (n >= 1e6) return 'Rp ' + (n / 1e6).toFixed(1).replace(/\.0$/, '') + ' jt';
  if (n >= 1e3) return 'Rp ' + (n / 1e3).toFixed(0) + ' rb';
  return 'Rp ' + n.toLocaleString('id-ID');
};

window.formatIDRFull = (n) => 'Rp ' + n.toLocaleString('id-ID');

window.timeAgo = (iso) => {
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'baru saja';
  if (mins < 60) return mins + ' menit lalu';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + ' jam lalu';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + ' hari lalu';
  return new Date(iso).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
};

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  <script type="text/babel">
// Module: GIS Dashboard — main command center
// Layout: KPI strip + 3-column (filters · map · EWS feed)

const TYPE_COLOR = {
  banjir: '#3b7dd8',
  karhutla: '#c94c2e',
  gempa: '#6b4ea0',
  longsor: '#a06a30',
  kekeringan: '#b5933a',
};

const TYPE_ICON = { banjir: 'droplet', karhutla: 'flame', gempa: 'activity', longsor: 'mountain', kekeringan: 'sun' };

function useLeaflet(layers, incidents, onSelect) {
  const mapRef = React.useRef(null);
  const elRef = React.useRef(null);
  const markersRef = React.useRef([]);
  const tileRef = React.useRef(null);

  React.useEffect(() => {
    if (!elRef.current || mapRef.current) return;
    const map = L.map(elRef.current, {
      center: [-2.5, 117],
      zoom: 5,
      zoomControl: true,
      attributionControl: true,
    });
    mapRef.current = map;
    // Invalidate map size when the container resizes (sidebar collapse,
    // tweaks panel, viewport changes) — Leaflet otherwise renders at the
    // initial size and clips.
    const ro = new ResizeObserver(() => {
      if (mapRef.current) mapRef.current.invalidateSize();
    });
    ro.observe(elRef.current);
    return () => {
      ro.disconnect();
      map.remove();
      mapRef.current = null;
    };
  }, []);

  // Tile layer (changes with basemap)
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    if (tileRef.current) map.removeLayer(tileRef.current);
    const url = layers.basemap === 'satellite'
      ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
      : layers.basemap === 'topo'
      ? 'https://a.tile.opentopomap.org/{z}/{x}/{y}.png'
      : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
    tileRef.current = L.tileLayer(url, {
      attribution: layers.basemap === 'satellite' ? 'Tiles © Esri' : '© OpenStreetMap',
      maxZoom: 18,
    }).addTo(map);
  }, [layers.basemap]);

  // Incident markers
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    markersRef.current.forEach(m => map.removeLayer(m));
    markersRef.current = [];
    if (!layers.incidents) return;
    incidents.forEach(inc => {
      const color = TYPE_COLOR[inc.type] || '#666';
      const icon = L.divIcon({
        className: '',
        html: `<div class="aman-marker" style="background:${color}"><div>${({banjir:'≈',karhutla:'🔥',gempa:'~',longsor:'△',kekeringan:'☀'})[inc.type]||'!'}</div></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 28],
      });
      const m = L.marker(inc.coords, { icon }).addTo(map);
      m.bindPopup(`
        <div style="min-width:200px">
          <div style="font-size:10px;color:#888;font-family:ui-monospace,monospace">${inc.id}</div>
          <div style="font-weight:600;font-size:13px;margin:4px 0 6px">${inc.title}</div>
          <div style="font-size:11px;color:#666;margin-bottom:6px">${inc.region}</div>
          <div style="display:flex;gap:6px;font-size:11px">
            <span style="background:${color};color:white;padding:2px 7px;border-radius:99px;font-weight:600">${inc.type}</span>
            <span style="color:#888">${inc.affected.toLocaleString()} jiwa</span>
          </div>
        </div>
      `);
      m.on('click', () => onSelect && onSelect(inc));
      markersRef.current.push(m);
    });
  }, [incidents, layers.incidents, onSelect]);

  // Indigenous territories layer (mock polygons)
  const territoriesRef = React.useRef([]);
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    territoriesRef.current.forEach(p => map.removeLayer(p));
    territoriesRef.current = [];
    if (!layers.territories) return;
    // Mock indigenous regions
    const polygons = [
      [[1.6, 112], [1.6, 114], [0.2, 114.2], [0.0, 112.4]], // West Kalimantan
      [[1, 102], [1, 103.5], [-0.3, 103.5], [-0.3, 102]],     // Riau
      [[-0.2, 119], [-0.2, 120.3], [-1.5, 120.3], [-1.5, 119]], // Sulteng
      [[-9.3, 119.8], [-9.3, 121], [-10.4, 121], [-10.4, 119.8]], // Sumba
    ];
    polygons.forEach(coords => {
      const p = L.polygon(coords, {
        color: '#3a7a4f', weight: 1.5, fillColor: '#3a7a4f', fillOpacity: 0.12, dashArray: '4 4'
      }).addTo(map);
      territoriesRef.current.push(p);
    });
  }, [layers.territories]);

  // EWS warning zones
  const ewsRef = React.useRef([]);
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    ewsRef.current.forEach(p => map.removeLayer(p));
    ewsRef.current = [];
    if (!layers.ews) return;
    AMAN_DATA.ewsAlerts.forEach(a => {
      const color = a.severity === 'high' ? '#c94c2e' : '#d99a30';
      const c = L.circle(a.coords, {
        radius: a.severity === 'high' ? 180000 : 100000,
        color, fillColor: color, fillOpacity: 0.08, weight: 1.5, dashArray: '6 4'
      }).addTo(map);
      c.bindPopup(`<div style="font-size:12px"><b>${a.type}</b><br/>${a.region}<br/><span style="color:#888;font-size:11px">${a.message}</span></div>`);
      ewsRef.current.push(c);
    });
  }, [layers.ews]);

  // Risk heatmap (mock — circle gradient at high-risk regions)
  const riskRef = React.useRef([]);
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    riskRef.current.forEach(p => map.removeLayer(p));
    riskRef.current = [];
    if (!layers.risk) return;
    const riskZones = [
      [0.5, 113, 0.85], [0.2, 102.5, 0.78], [-0.7, 119.7, 0.62],
      [-0.8, 100.6, 0.5], [-9.7, 120.2, 0.55], [-3.3, 104.4, 0.45]
    ];
    riskZones.forEach(([lat, lon, v]) => {
      const radius = 220000 * v;
      for (let i = 3; i > 0; i--) {
        const c = L.circle([lat, lon], {
          radius: radius * (i / 3),
          color: 'transparent',
          fillColor: v > 0.7 ? '#c94c2e' : v > 0.5 ? '#d99a30' : '#3a7a4f',
          fillOpacity: 0.10,
          weight: 0,
          interactive: false,
        }).addTo(map);
        riskRef.current.push(c);
      }
    });
  }, [layers.risk]);

  return elRef;
}

function StatCard({ label, label_en, value, sub, sub_en, accent, lang }) {

        {lang === 'id' ? label : label_en}

    ],
  },
];

// Get all leaf ids under a node
function leafIds(node) {
  if (node.leaf) return [node.id];
  if (!node.children) return [];
  return node.children.flatMap(leafIds);
}

const DEFAULT_LAYERS = {
  'incidents.banjir': true, 'incidents.karhutla': true, 'incidents.gempa': true, 'incidents.longsor': true, 'incidents.kekeringan': true,
  'ews.high': true, 'ews.medium': true,
  'territories': true, 'risk': false,
  'basemap.street': true, 'basemap.satellite': false, 'basemap.topo': false,
};

function LayerNode({ node, depth, layers, setLayers, lang }) {
  const [expanded, setExpanded] = React.useState(depth < 2);
  const isLeaf = !!node.leaf;
  const leaves = leafIds(node);
  const onCount = leaves.filter(id => layers[id]).length;
  const allOn = onCount === leaves.length;
  const someOn = onCount > 0 && !allOn;

  const toggle = () => {
    const next = { ...layers };
    if (node.radio) {
      // Radio behavior for basemaps
      leaves.forEach(id => { next[id] = false; });
      next[leaves[0]] = true;
    } else {
      const turnOn = !allOn;
      leaves.forEach(id => { next[id] = turnOn; });
    }
    setLayers(next);
  };

  const handleLeafClick = () => {
    if (node.isBasemap) {
      // Mutually exclusive
      const next = { ...layers };
      ['basemap.street', 'basemap.satellite', 'basemap.topo'].forEach(id => next[id] = false);
      next[node.id] = true;
      setLayers(next);
    } else {
      setLayers({ ...layers, [node.id]: !layers[node.id] });
    }
  };

  return (
    <div>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '5px 10px 5px ' + (10 + depth * 12) + 'px',
        cursor: 'pointer', fontSize: 12.5,
        borderRadius: 4,
      }}
        onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-subtle)'}
        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
        {!isLeaf ? (
          <button onClick={() => setExpanded(!expanded)} style={{
            border: 0, background: 'transparent', padding: 0,
            width: 14, height: 14, display: 'grid', placeItems: 'center', color: 'var(--fg-muted)',
            transform: expanded ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform .15s',
          }}>
            <Icon name="chev" size={10} />
          </button>
        ) : (
          <span style={{ width: 14 }}></span>
        )}
        {node.isBasemap ? (
          <input type="radio" name="basemap" checked={!!layers[node.id]} onChange={handleLeafClick} />
        ) : (
          <input type="checkbox"
            ref={el => el && (el.indeterminate = !isLeaf && someOn)}
            checked={isLeaf ? !!layers[node.id] : allOn}
            onChange={isLeaf ? handleLeafClick : toggle} />
        )}
        {node.color && (
          <span style={{ width: 10, height: 10, borderRadius: 3, background: node.color, flexShrink: 0 }}></span>
        )}
        <span style={{
          flex: 1, fontWeight: isLeaf ? 400 : 600,
          color: !isLeaf && onCount === 0 ? 'var(--fg-muted)' : 'var(--fg)',
        }} onClick={isLeaf ? handleLeafClick : () => setExpanded(!expanded)}>
          {lang === 'id' ? node.label : node.label_en}
        </span>
        {!isLeaf && (
          <span style={{
            fontSize: 10, color: 'var(--fg-muted)', fontFamily: 'var(--font-mono)',
            background: 'var(--bg-subtle)', padding: '0 5px', borderRadius: 3, fontWeight: 600,
          }}>{onCount}/{leaves.length}</span>
        )}
      </div>
      {!isLeaf && expanded && node.children && (
        <div>
          {node.children.map(c => (
            <LayerNode key={c.id} node={c} depth={depth + 1} layers={layers} setLayers={setLayers} lang={lang} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── main module ──────────────────────────────────────────────────────────────

const GisDashboardModule = ({ lang }) => {
  const [layers, setLayers] = React.useState(DEFAULT_LAYERS);
  const [tool, setTool] = React.useState('select');

  const [cursorCoords, setCursorCoords] = React.useState(null);

  const layerGroups = React.useRef({});

  const cutoffDate = React.useMemo(() => {
    const d = new Date(2026, 0, 1);
    d.setDate(d.getDate() + timelinePos);

  }, [timelinePos]);

  const visibleIncidents = React.useMemo(() => {

    const group = displayMode === 'cluster' && window.L.markerClusterGroup

    const group = L.layerGroup();
    const polygons = [
      { name: 'Wilayah Adat Dayak Iban', comm: 'Dayak Iban', coords: [[1.6, 112], [1.6, 114], [0.2, 114.2], [0.0, 112.4]], area: 8420, pop: 12400 },
      { name: 'Wilayah Adat Petalangan', comm: 'Petalangan', coords: [[1, 102], [1, 103.5], [-0.3, 103.5], [-0.3, 102]], area: 6240, pop: 8800 },

    });
    group.addTo(map);
    layerGroups.current.drawn = group;
  }, [drawnFeatures]);

  // Measure overlay
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.measure) map.removeLayer(layerGroups.current.measure);
    if (measurePoints.length === 0) return;
    const group = L.layerGroup();
    measurePoints.forEach(pt => {
      group.addLayer(L.circleMarker(pt, { radius: 4, color: '#c94c2e', fillColor: 'white', fillOpacity: 1, weight: 2 }));
    });
    if (measurePoints.length >= 2) {
      group.addLayer(L.polyline(measurePoints, { color: '#c94c2e', weight: 2, dashArray: '5 5' }));
    }
    group.addTo(map);
    layerGroups.current.measure = group;
  }, [measurePoints]);

  // Buffer overlay around selected incident
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (layerGroups.current.buffer) map.removeLayer(layerGroups.current.buffer);
    if (tool !== 'buffer' || !selected || selected.kind !== 'incident') return;
    const buf = L.circle(selected.data.coords, {
      radius: bufferRadius * 1000,
      color: 'var(--primary)', fillColor: 'var(--primary)', fillOpacity: 0.1,
      weight: 2, dashArray: '5 5',
    });
    buf.addTo(map);
    layerGroups.current.buffer = buf;
  }, [tool, selected, bufferRadius]);

  // Map click handler depends on active tool
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    const onClick = (e) => {
      const pt = [e.latlng.lat, e.latlng.lng];
      if (tool === 'draw') {
        setDrawnFeatures(prev => {
          const last = prev[prev.length - 1];
          if (last && !last.finished) {
            return [...prev.slice(0, -1), { ...last, points: [...last.points, pt] }];
          }
          return [...prev, { type: 'polygon', points: [pt], finished: false }];
        });
      } else if (tool === 'measure') {
        setMeasurePoints(prev => prev.length >= 2 ? [pt] : [...prev, pt]);
      }
    };
    const onDouble = () => {
      if (tool === 'draw') {
        setDrawnFeatures(prev => {
          const last = prev[prev.length - 1];
          if (last && !last.finished) {
            return [...prev.slice(0, -1), { ...last, finished: true }];
          }
          return prev;
        });
      }
    };
    map.on('click', onClick);
    map.on('dblclick', onDouble);
    return () => { map.off('click', onClick); map.off('dblclick', onDouble); };
  }, [tool]);

  // Distance helper (haversine, km)
  const haversine = (a, b) => {
    const R = 6371;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(b[0] - a[0]);
    const dLon = toRad(b[1] - a[1]);
    const lat1 = toRad(a[0]);
    const lat2 = toRad(b[0]);
    const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(h));
  };

  const measureDist = measurePoints.length >= 2 ? haversine(measurePoints[0], measurePoints[1]) : 0;

  const monthLabel = (m) => lang === 'id' ? m.label : (m.label_en || m.label);
  const [layerPanelOpen, setLayerPanelOpen] = React.useState(true);

  return (
    <>
      {/* Full-page map container with floating overlays */}
      <div style={{ position: 'relative', flex: 1, minHeight: 0, overflow: 'hidden' }}>
        {/* MAP fills the entire area */}
        <div ref={elRef} style={{
          position: 'absolute', inset: 0,
          cursor: tool === 'draw' ? 'crosshair' : tool === 'measure' ? 'crosshair' : 'default',
        }}></div>

        {/* FLOATING TOP TOOLBAR */}
        <div className="scroll" style={{
          position: 'absolute', top: 14, left: '50%', transform: 'translateX(-50%)',
          maxWidth: 'calc(100% - 28px)', zIndex: 500,
          background: 'var(--bg-elev)', borderRadius: 12,
          boxShadow: '0 4px 18px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.04)',
          border: '1px solid var(--border)',
          display: 'flex', alignItems: 'center', padding: '6px 10px', gap: 8,
          overflowX: 'auto', overflowY: 'hidden', height: 48,
        }}>
          <div style={{ fontSize: 10.5, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.06, color: 'var(--fg-muted)', flexShrink: 0, paddingLeft: 4 }}>
            GIS
          </div>

          <div style={{ display: 'flex', gap: 2, padding: 2, background: 'var(--bg-subtle)', borderRadius: 7, flexShrink: 0 }}>
            {TOOLS.map(t => {
              const active = tool === t.id;
              return (
                <button key={t.id} onClick={() => {
                  setTool(t.id);
                  if (t.id === 'measure') setMeasurePoints([]);
                  if (t.id === 'draw') showToast(lang === 'id' ? 'Klik untuk vertex, double-click untuk selesai' : 'Click to add vertex, double-click to finish');
                  if (t.id === 'buffer' && (!selected || selected.kind !== 'incident')) showToast(lang === 'id' ? 'Pilih insiden dulu lalu aktifkan Buffer' : 'Select an incident first, then activate Buffer');
                }}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 5,
                    padding: '5px 10px', borderRadius: 5, border: 0,
                    background: active ? 'var(--primary)' : 'transparent',
                    color: active ? 'white' : 'var(--fg-muted)',
                    fontSize: 11.5, fontWeight: 600,
                  }} title={lang === 'id' ? t.label_id : t.label}>
                  <Icon name={t.icon} size={12} />
                  {lang === 'id' ? t.label_id : t.label}
                </button>
              );
            })}
          </div>

          <div style={{ height: 24, width: 1, background: 'var(--border)', flexShrink: 0 }}></div>

          <div style={{ display: 'flex', gap: 2, padding: 2, background: 'var(--bg-subtle)', borderRadius: 7, flexShrink: 0 }}>
            {[
              { id: 'markers', label: lang === 'id' ? 'Marker' : 'Markers' },
              { id: 'cluster', label: 'Cluster' },
              { id: 'heatmap', label: 'Heatmap' },
            ].map(m => (
              <button key={m.id} onClick={() => setDisplayMode(m.id)}
                style={{
                  padding: '5px 10px', borderRadius: 5, border: 0,
                  background: displayMode === m.id ? 'var(--primary)' : 'transparent',
                  color: displayMode === m.id ? 'white' : 'var(--fg-muted)',
                  fontSize: 11.5, fontWeight: 600,
                }}>{m.label}</button>
            ))}
          </div>

          {/* Tool-specific status */}
          {tool === 'coord' && cursorCoords && (
            <div className="tag-mono" style={{ fontSize: 11, color: 'var(--primary)', fontWeight: 600, flexShrink: 0, paddingLeft: 6 }}>
              {cursorCoords[0].toFixed(4)}, {cursorCoords[1].toFixed(4)}
            </div>
          )}
          {tool === 'measure' && measurePoints.length >= 2 && (
            <div className="tag-mono" style={{ fontSize: 11.5, color: 'var(--danger)', fontWeight: 700, flexShrink: 0, paddingLeft: 6 }}>
              ↔ {measureDist.toFixed(2)} km
            </div>
          )}
          {tool === 'measure' && measurePoints.length === 1 && (
            <div style={{ fontSize: 11, color: 'var(--fg-muted)', flexShrink: 0, paddingLeft: 6 }}>
              {lang === 'id' ? 'Klik titik kedua…' : 'Click second point…'}
            </div>
          )}
          {tool === 'buffer' && selected?.kind === 'incident' && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0, paddingLeft: 6 }}>
              <span style={{ fontSize: 11, color: 'var(--fg-muted)' }}>R:</span>
              <input type="range" min={10} max={300} step={5} value={bufferRadius}
                onChange={e => setBufferRadius(Number(e.target.value))}
                style={{ width: 80 }} />
              <span className="tag-mono" style={{ fontSize: 11, color: 'var(--primary)', fontWeight: 700, minWidth: 50 }}>{bufferRadius} km</span>
            </div>
          )}
        </div>

        {/* TOP-RIGHT STATUS CHIPS */}
        <div style={{ position: 'absolute', top: 14, right: 80, zIndex: 500, display: 'flex', gap: 6, alignItems: 'center' }}>
          <span className="chip ok" style={{ fontSize: 10, background: 'var(--bg-elev)', boxShadow: '0 2px 6px rgba(0,0,0,0.08)' }}>
            <span className="pulse-marker" style={{ width: 5, height: 5, background: 'var(--ok)' }}></span>
            GPS · 6 sat
          </span>
          <button className="btn sm" style={{
            background: 'var(--bg-elev)', boxShadow: '0 2px 6px rgba(0,0,0,0.08)', height: 26,
          }} onClick={() => { setDrawnFeatures([]); setMeasurePoints([]); showToast(lang === 'id' ? 'Anotasi dihapus' : 'Annotations cleared'); }}>
            <Icon name="x" size={10} />{lang === 'id' ? 'Bersihkan' : 'Clear'}
          </button>
          <button className="btn sm" style={{
            background: 'var(--bg-elev)', boxShadow: '0 2px 6px rgba(0,0,0,0.08)', height: 26,
          }} onClick={() => showToast(lang === 'id' ? 'Ekspor GeoJSON dimulai' : 'Exporting GeoJSON…')}>
            <Icon name="download" size={10} />Export
          </button>
        </div>

        {/* FLOATING LAYER PANEL — left */}
        <aside style={{
          position: 'absolute', top: 74, left: 14, zIndex: 500,
          width: layerPanelOpen ? 260 : 44,
          maxHeight: 'calc(100% - 220px)',
          background: 'var(--bg-elev)', borderRadius: 12,
          boxShadow: '0 8px 24px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.04)',

        }}>
          <div style={{ padding: '10px 12px', borderBottom: layerPanelOpen ? '1px solid var(--border)' : '0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 6, flexShrink: 0 }}>

                <button className="btn sm ghost" style={{ padding: '0 8px', height: 22, fontSize: 10.5 }}

                  {lang === 'id' ? 'Reset' : 'Reset'}

          </div>
          {layerPanelOpen && (
            <>
              <div className="scroll" style={{ flex: 1, overflowY: 'auto', padding: '6px 4px', minHeight: 0 }}>
                {LAYER_TREE.map(node => (

                ))}
              </div>
              <div style={{ padding: '10px 12px', borderTop: '1px solid var(--border)', background: 'var(--bg-subtle)', fontSize: 11, color: 'var(--fg-muted)', flexShrink: 0 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
                  <span>{lang === 'id' ? 'Insiden terlihat' : 'Visible'}</span>
                  <span style={{ fontWeight: 700, color: 'var(--fg)' }}>{visibleIncidents.length}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span>Mode</span>
                  <span style={{ fontWeight: 700, color: 'var(--primary)' }}>{displayMode}</span>
                </div>
              </div>
            </>
          )}
        </aside>

        {/* FLOATING SPATIAL INSPECTOR — right (only when feature selected) */}
        {selected && (
          <aside style={{
            position: 'absolute', top: 74, right: 14, zIndex: 500,
            width: 300, maxHeight: 'calc(100% - 220px)',
            background: 'var(--bg-elev)', borderRadius: 12,
            boxShadow: '0 8px 24px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.04)',
            border: '1px solid var(--border)',
            display: 'flex', flexDirection: 'column', overflow: 'hidden',
            animation: 'slideInRight .2s ease',
          }}>
            <div style={{ padding: '10px 14px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 0.06, textTransform: 'uppercase' }}>
                {lang === 'id' ? 'Spatial Inspector' : 'Spatial Inspector'}
              </div>
              <button className="btn sm ghost" style={{ padding: '0 6px', height: 22, fontSize: 10.5 }}
                onClick={() => setSelected(null)}>
                <Icon name="x" size={11} />
              </button>
            </div>
            <div className="scroll" style={{ flex: 1, overflowY: 'auto', minHeight: 0 }}>

              {selected.kind === 'ews' && <EwsInspector lang={lang} alert={selected.data} />}
              {selected.kind === 'territory' && <TerritoryInspector lang={lang} t={selected.data} />}
              {selected.kind === 'drawn' && <DrawnInspector lang={lang} f={selected.data} idx={selected.index} />}
            </div>
          </aside>
        )}

        {/* FLOATING TIMELINE — bottom */}
        <div style={{
          position: 'absolute', bottom: 14, left: '50%', transform: 'translateX(-50%)',
          width: 'min(calc(100% - 28px), 880px)', zIndex: 500,
          background: 'var(--bg-elev)', borderRadius: 12,
          boxShadow: '0 8px 24px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.04)',
          border: '1px solid var(--border)',
          padding: '12px 18px',
          display: 'flex', flexDirection: 'column', gap: 6,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <button onClick={() => setPlaying(!playing)}
              style={{
                width: 28, height: 28, borderRadius: '50%', border: 0,
                background: playing ? 'var(--danger)' : 'var(--primary)', color: 'white',
                display: 'grid', placeItems: 'center', flexShrink: 0,
              }}>
              {playing ? <Icon name="x" size={12} /> : <span style={{ fontSize: 11 }}>▶</span>}
            </button>
            <button onClick={() => { setPlaying(false); setTimelinePos(0); }} className="btn sm" style={{ height: 24, padding: '0 8px', fontSize: 11 }}>
              <Icon name="refresh" size={10} />{lang === 'id' ? 'Reset' : 'Reset'}
            </button>
            <div style={{ fontSize: 12, fontWeight: 600, flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              <span style={{ color: 'var(--fg-muted)', fontWeight: 500 }}>{lang === 'id' ? 'Playback:' : 'Playback:'}</span>{' '}
              <span className="tag-mono" style={{ color: 'var(--primary)' }}>
                {cutoffDate.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', { day: 'numeric', month: 'long', year: 'numeric' })}
              </span>
            </div>
            <div style={{ fontSize: 11, color: 'var(--fg-muted)', flexShrink: 0 }}>
              <span style={{ color: 'var(--fg)', fontWeight: 700 }}>{visibleIncidents.length}</span> {lang === 'id' ? 'insiden' : 'incidents'}
            </div>
          </div>

          <div style={{ position: 'relative', height: 24 }}>
            <input type="range" min={0} max={135} value={timelinePos}
              onChange={e => { setPlaying(false); setTimelinePos(Number(e.target.value)); }}
              style={{
                position: 'absolute', inset: 0, width: '100%', height: '100%',
                WebkitAppearance: 'none', appearance: 'none',
                background: 'transparent', cursor: 'pointer', zIndex: 2, margin: 0,
              }} />
            <div style={{
              position: 'absolute', left: 0, right: 0, top: '50%', height: 6,
              background: 'var(--bg-subtle)', borderRadius: 999, transform: 'translateY(-50%)',
            }}></div>
            <div style={{
              position: 'absolute', left: 0, top: '50%', height: 6, width: (timelinePos / 135 * 100) + '%',
              background: 'linear-gradient(to right, var(--ok), var(--warn), var(--danger))',
              borderRadius: 999, transform: 'translateY(-50%)',
            }}></div>
            {TIMELINE_MONTHS.map(m => {
              const pos = (m.idx * 30 / 135) * 100;
              return (
                <div key={m.idx} style={{
                  position: 'absolute', left: pos + '%', top: '50%',
                  transform: 'translate(-50%, -50%)',
                  width: 8, height: 8, borderRadius: '50%',
                  background: 'var(--bg-elev)', border: '2px solid var(--border-strong)',
                  pointerEvents: 'none',
                }}></div>
              );
            })}
            <div style={{
              position: 'absolute', left: (timelinePos / 135 * 100) + '%', top: '50%',
              transform: 'translate(-50%, -50%)',
              width: 14, height: 14, borderRadius: '50%',
              background: 'var(--primary)', border: '3px solid var(--bg-elev)',
              boxShadow: '0 2px 6px rgba(0,0,0,0.2)',
              pointerEvents: 'none',
            }}></div>
          </div>
          <div style={{ position: 'relative', height: 12 }}>
            {TIMELINE_MONTHS.map(m => {
              const pos = (m.idx * 30 / 135) * 100;
              return (
                <div key={m.idx} style={{
                  position: 'absolute', left: pos + '%', transform: 'translateX(-50%)',
                  fontSize: 10, fontWeight: 600, color: 'var(--fg-muted)',
                }}>{monthLabel(m)} '26</div>
              );
            })}
          </div>
        </div>
      </div>

      {toast && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: 'var(--green-900)', color: 'white', padding: '10px 18px', borderRadius: 10,
          fontSize: 13, display: 'flex', gap: 8, alignItems: 'center', zIndex: 9999,
          boxShadow: '0 10px 30px rgba(0,0,0,0.2)',
        }}>
          <Icon name="check" />{toast}
        </div>
      )}
    </>
  );
};

function TerritoryInspector({ lang, t }) {

// ── tiny SVG chart primitives ────────────────────────────────────────────────

function AreaChart({ data, height = 140, colors = ['var(--primary)'], stacked = true, showAxis = true }) {
  // data: [{ label, values: [n1, n2, ...] }]
  const W = 600;
  const H = height;
  const pad = { l: 28, r: 12, t: 12, b: showAxis ? 22 : 4 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const n = data.length;
  const seriesCount = data[0]?.values.length || 1;
  const stacks = data.map(d => stacked ? d.values.reduce((a, b) => a + b, 0) : Math.max(...d.values));
  const max = Math.ceil(Math.max(...stacks, 1) * 1.1 / 5) * 5;
  const x = i => pad.l + (innerW * i) / Math.max(1, n - 1);
  const y = v => pad.t + innerH - (v / max) * innerH;
  const paths = [];
  for (let s = 0; s < seriesCount; s++) {
    const points = data.map((d, i) => {
      const upTo = stacked ? d.values.slice(0, s + 1).reduce((a, b) => a + b, 0) : d.values[s];
      return [x(i), y(upTo)];
    });
    const basePoints = data.map((d, i) => {
      const upTo = stacked ? d.values.slice(0, s).reduce((a, b) => a + b, 0) : 0;
      return [x(i), y(upTo)];
    });
    const top = points.map(([px, py], i) => `${i ? 'L' : 'M'}${px},${py}`).join(' ');
    const bot = basePoints.slice().reverse().map(([px, py]) => `L${px},${py}`).join(' ');
    paths.push({ d: top + ' ' + bot + ' Z', line: top, color: colors[s % colors.length] });
  }
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: H, display: 'block' }}>
      {[0, 0.25, 0.5, 0.75, 1].map(t => (
        <line key={t} x1={pad.l} x2={W - pad.r} y1={pad.t + innerH * t} y2={pad.t + innerH * t}
              stroke="var(--border)" strokeWidth="1" strokeDasharray={t === 1 ? '0' : '2 3'} />
      ))}
      {showAxis && [0, 0.5, 1].map(t => (
        <text key={t} x={pad.l - 6} y={pad.t + innerH * (1 - t) + 4}
              fontSize="9" fill="var(--fg-muted)" textAnchor="end" fontFamily="var(--font-mono)">
          {Math.round(max * t)}
        </text>
      ))}
      {paths.map((p, i) => (
        <g key={i}>
          <path d={p.d} fill={p.color} opacity="0.15" />
          <path d={p.line} fill="none" stroke={p.color} strokeWidth="2" />
        </g>
      ))}
      {showAxis && data.map((d, i) => i % Math.ceil(n / 8) === 0 && (
        <text key={i} x={x(i)} y={H - 6}
              fontSize="9" fill="var(--fg-muted)" textAnchor="middle">
          {d.label}
        </text>
      ))}
    </svg>
  );
}

function BarChart({ data, height = 140, color = 'var(--primary)' }) {
  // data: [{ label, value }]
  const W = 600, H = height;
  const pad = { l: 28, r: 12, t: 12, b: 22 };
  const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;
  const max = Math.ceil(Math.max(...data.map(d => d.value)) * 1.15);
  const barW = innerW / data.length * 0.62;
  const slot = innerW / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: H, display: 'block' }}>
      {[0, 0.5, 1].map(t => (
        <line key={t} x1={pad.l} x2={W - pad.r} y1={pad.t + innerH * t} y2={pad.t + innerH * t}
              stroke="var(--border)" strokeWidth="1" strokeDasharray={t === 1 ? '0' : '2 3'} />
      ))}
      {[0, 0.5, 1].map(t => (
        <text key={t} x={pad.l - 6} y={pad.t + innerH * (1 - t) + 4}
              fontSize="9" fill="var(--fg-muted)" textAnchor="end" fontFamily="var(--font-mono)">
          {Math.round(max * t)}
        </text>
      ))}
      {data.map((d, i) => {
        const h = (d.value / max) * innerH;
        const cx = pad.l + slot * (i + 0.5);
        return (
          <g key={i}>
            <rect x={cx - barW / 2} y={pad.t + innerH - h} width={barW} height={h}
                  fill={d.color || color} rx="3" />
            <text x={cx} y={H - 6} fontSize="9" fill="var(--fg-muted)" textAnchor="middle">
              {d.label}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function DonutChart({ data, size = 160, thickness = 22, centerLabel, centerSub }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  const r = size / 2 - thickness / 2 - 2;
  const cx = size / 2, cy = size / 2;
  let acc = 0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width: size, height: size, flexShrink: 0 }}>
      {data.map((d, i) => {
        const start = (acc / total) * Math.PI * 2 - Math.PI / 2;
        acc += d.value;
        const end = (acc / total) * Math.PI * 2 - Math.PI / 2;
        const large = end - start > Math.PI ? 1 : 0;
        const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
        const x2 = cx + r * Math.cos(end), y2 = cy + r * Math.sin(end);
        return (
          <path key={i} d={`M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}`}
                fill="none" stroke={d.color} strokeWidth={thickness} strokeLinecap="butt" />
        );
      })}
      {centerLabel && (
        <text x={cx} y={cy - 2} fontSize="22" fontWeight="700" textAnchor="middle" fill="var(--fg)" letterSpacing="-0.02em">
          {centerLabel}
        </text>
      )}
      {centerSub && (
        <text x={cx} y={cy + 14} fontSize="10" fill="var(--fg-muted)" textAnchor="middle">
          {centerSub}
        </text>
      )}
    </svg>
  );
}

}

const DEFAULT_WEIGHTS = {
  hazard:   { rainfall: 25, riverFlood: 25, deforestation: 20, seismic: 15, drought: 15 },
  vuln:     { density: 20, poverty: 25, infraAge: 20, isolation: 25, elderly: 10 },
  capacity: { roads: 20, healthCenters: 25, evacPoints: 20, warnings: 20, trainedVol: 15 },
  category: { hazard: 40, vuln: 35, capacity: 25 },
};

function normalize(obj) {
  const sum = Object.values(obj).reduce((a, b) => a + b, 0);
  if (sum === 0) return obj;
  const out = {};
  Object.entries(obj).forEach(([k, v]) => out[k] = (v / sum) * 100);
  return out;
}

// IRB = (Hazard × Vulnerability) / Capacity, scaled.
// We weight all params first, then combine three components.
function calculateIRB(region, weights) {
  const nH = normalize(weights.hazard);
  const nV = normalize(weights.vuln);
  const nC = normalize(weights.capacity);
  const nCat = normalize(weights.category);

  const hazardScore = Object.entries(nH).reduce((s, [k, w]) => s + region.hazard[k] * w / 100, 0);
  const vulnScore = Object.entries(nV).reduce((s, [k, w]) => s + region.vuln[k] * w / 100, 0);
  const capacityScore = Object.entries(nC).reduce((s, [k, w]) => s + region.capacity[k] * w / 100, 0);

  // Combined: weighted by category, with capacity reducing risk
  // Final IRB on 0-100 scale: ((H * wH + V * wV) - C * wC) normalized
  const positive = hazardScore * nCat.hazard / 100 + vulnScore * nCat.vuln / 100;
  const mitigation = capacityScore * nCat.capacity / 100;
  const raw = Math.max(0, positive - mitigation * 0.6);
  // Compress to 0-100
  return { hazardScore, vulnScore, capacityScore, irb: Math.min(100, Math.max(0, raw)) };
}

function riskBand(score) {
  if (score >= 75) return { id: 'Sangat Tinggi', en: 'Very High', color: '#a63426', bg: 'var(--danger-bg)' };
  if (score >= 60) return { id: 'Tinggi', en: 'High', color: '#c94c2e', bg: 'var(--danger-bg)' };
  if (score >= 45) return { id: 'Sedang', en: 'Medium', color: '#d99a30', bg: 'var(--warn-bg)' };
  if (score >= 30) return { id: 'Rendah', en: 'Low', color: '#5e8a2a', bg: 'var(--ok-bg)' };
  return { id: 'Sangat Rendah', en: 'Very Low', color: 'var(--fg-muted)', bg: 'var(--bg-subtle)' };
}

                      <div style={{ fontSize: 13.5, fontWeight: 600, marginBottom: 4 }}>{b.type} — {b.region}</div>
                      <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
                        <span className="chip" style={{ background: sevBg, color: sevColor, borderColor: 'transparent', fontSize: 10 }}>{b.severity}</span>
                        {b.channels.map(c => {
                          const ch = CHANNEL_STATS.find(x => x.id === c);
                          return ch ? <span key={c} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '1px 7px', borderRadius: 999, fontSize: 10, fontWeight: 600, background: 'var(--bg-subtle)', color: 'var(--fg-muted)' }}>
                            <Icon name={ch.icon} size={9} style={{ color: ch.color }} />{ch.name.split(' ')[0]}
                          </span> : null;
                        })}
                      </div>
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4, minWidth: 130 }}>
                      <div style={{ fontSize: 18, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>

                      <div style={{ display: 'flex', gap: 6, fontSize: 10.5, marginTop: 4 }}>

                        <span style={{ color: 'var(--fg-muted)' }}>· ack {ackRate}%</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </>

};

// Convert primary hex into oklch-compatible hue we can use for accents
function hexToHue(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, c => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  const r = ((n >> 16) & 255) / 255;
  const g = ((n >> 8) & 255) / 255;
  const b = (n & 255) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let hue = 0;
  if (max !== min) {
    const d = max - min;
    switch (max) {
      case r: hue = ((g - b) / d + (g < b ? 6 : 0)); break;
      case g: hue = ((b - r) / d + 2); break;
      case b: hue = ((r - g) / d + 4); break;
    }
    hue *= 60;
  }
  return hue;
}
